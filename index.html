<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --checkbox-color: #007AFF;
            --bg-color: #ffffff;
            --text-color: #1f2937;
            --secondary-bg: #f3f4f6;
            --border-color: #e5e7eb;
            --modal-overlay: rgba(0, 0, 0, 0.5);
            --ring-bg: #e5e7eb;
            --focus-ring: rgba(59, 130, 246, 0.25);
            --error-color: #ef4444;
            --warning-color: #f59e0b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --text-color: #ffffff;
                --secondary-bg: #1f2937;
                --border-color: #374151;
                --modal-overlay: rgba(0, 0, 0, 0.7);
                --ring-bg: #374151;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 480px;
            width: 100%;
            padding: 2rem;
            background-color: var(--secondary-bg);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .mode-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .mode-button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.2s;
            font-size: 1rem;
            min-height: 44px;
        }

        .mode-button:hover {
            opacity: 0.9;
        }

        .mode-button.active {
            opacity: 1;
            font-weight: 600;
            background-color: var(--primary-color);
            color: white;
        }

        .timer-display {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .timer-circle {
            position: relative;
            width: 16rem;
            height: 16rem;
            margin: 0 auto;
        }

        .timer-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }

        .time {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            line-height: 1;
        }

        .cycle-count {
            font-size: 0.875rem;
            opacity: 0.7;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring__circle {
            fill: none;
            stroke: var(--ring-bg);
            stroke-width: 4;
        }

        .progress-ring__path {
            fill: none;
            stroke: var(--primary-color);
            stroke-linecap: round;
            stroke-width: 4;
            transition: stroke-dashoffset 0.35s;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .control-button {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            border: none;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            min-height: 44px;
        }

        .control-button:hover {
            background-color: var(--border-color);
        }

        .modal {
            position: fixed;
            inset: 0;
            background-color: var(--modal-overlay);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            z-index: 50;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-color);
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 28rem;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            padding: 0.5rem;
        }

        .setting-group {
            margin-bottom: 1.5rem;
        }

        .setting-group:last-child {
            margin-bottom: 0;
        }

        .setting-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .setting-group input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
            min-height: 44px;
        }

        .setting-group input[type="number"]:hover {
            border-color: var(--primary-color);
        }

        .setting-group input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .setting-group input[type="number"]::-webkit-inner-spin-button,
        .setting-group input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .setting-group input[type="number"] {
            -moz-appearance: textfield;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
            padding: 0.5rem 0;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-size: 16px;
            line-height: 1.5;
        }

        .checkbox-group input[type="checkbox"] {
            margin: 0;
            width: 20px;
            height: 20px;
            accent-color: var(--checkbox-color);
            cursor: pointer;
        }

        .notification-status {
            font-size: 0.875rem;
            margin-top: 0.25rem;
            color: var(--warning-color);
            display: none;
        }

        .notification-status.visible {
            display: block;
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .save-button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1.5rem;
            min-height: 44px;
        }

        .save-button:hover {
            background-color: #2563eb;
        }

        .notification-setting {
            display: none;
        }

        .notification-setting.visible {
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 1rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 1000;
            max-width: 300px;
            animation: slideIn 0.3s ease-out;
        }

        .toast.visible {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }

            .timer-circle {
                width: 12rem;
                height: 12rem;
            }

            .time {
                font-size: 2.5rem;
            }

            .modal-content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode-buttons">
            <button id="focusButton" class="mode-button active">Focus 25m</button>
            <button id="breakButton" class="mode-button">Break 5m</button>
        </div>

        <div class="timer-display">
            <div class="timer-circle">
                <svg class="progress-ring" width="100%" height="100%" viewBox="0 0 100 100">
                    <circle class="progress-ring__circle" cx="50" cy="50" r="45"/>
                    <circle class="progress-ring__path" cx="50" cy="50" r="45"/>
                </svg>
                <div class="timer-content">
                    <div id="timeDisplay" class="time">25:00</div>
                    <div id="cycleDisplay" class="cycle-count">Cycle 0/4</div>
                </div>
            </div>
        </div>

        <div class="control-buttons">
            <button id="settingsButton" class="control-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
            <button id="toggleButton" class="control-button">
                <svg class="play-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <svg class="pause-icon" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>
            <button id="resetButton" class="control-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 2v6h6"></path>
                    <path d="M3 13a9 9 0 1 0 3-7.7L3 8"></path>
                </svg>
            </button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Settings</h2>
                <button class="close-modal">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <div class="setting-group">
                <label for="focusTime">Focus Duration (minutes)</label>
                <input type="number" id="focusTime" min="1" max="120" value="25">
                <div id="focusTime-error" class="error-message"></div>
            </div>

            <div class="setting-group">
                <label for="breakTime">Short Break Duration (minutes)</label>
                <input type="number" id="breakTime" min="1" max="30" value="5">
                <div id="breakTime-error" class="error-message"></div>
            </div>

            <div class="setting-group">
                <label for="longBreak">Long Break Duration (minutes)</label>
                <input type="number" id="longBreak" min="1" max="60" value="15">
                <div id="longBreak-error" class="error-message"></div>
            </div>

            <div class="setting-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="trackCycles">
                    <label for="trackCycles">Track Pomodoro Cycles</label>
                </div>
            </div>

            <div id="cycleSettings" class="setting-group">
                <label for="cyclesBeforeLongBreak">Cycles before Long Break</label>
                <input type="number" id="cyclesBeforeLongBreak" min="1" max="10" value="4">
                <div id="cyclesBeforeLongBreak-error" class="error-message"></div>
            </div>

            <div class="setting-group notification-setting">
                <div class="checkbox-group">
                    <input type="checkbox" id="enableNotifications">
                    <label for="enableNotifications">Enable Notifications</label>
                </div>
                <div id="notificationStatus" class="notification-status"></div>
            </div>

            <button class="save-button">Save Settings</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let settings = {
            focusTime: 25,
            breakTime: 5,
            longBreak: 15,
            trackCycles: true,
            cyclesBeforeLongBreak: 4,
            enableNotifications: false,
            notificationIcon: 'icon-180.png'
        };

        let isRunning = false;
        let mode = 'focus';
        let timeLeft = settings.focusTime * 60;
        let currentCycle = 0;
        let timerId = null;
        let isFirstStart = true;
        let startTime = null;
        let expectedTime = null;
        let lastUpdateTime = Date.now();

        // DOM Elements
        const timeDisplay = document.getElementById('timeDisplay');
        const cycleDisplay = document.getElementById('cycleDisplay');
        const toggleButton = document.getElementById('toggleButton');
        const focusButton = document.getElementById('focusButton');
        const breakButton = document.getElementById('breakButton');
        const settingsButton = document.getElementById('settingsButton');
        const resetButton = document.getElementById('resetButton');
        const settingsModal = document.getElementById('settingsModal');
        const closeModalButton = document.querySelector('.close-modal');
        const saveButton = document.querySelector('.save-button');
        const cycleSettings = document.getElementById('cycleSettings');
        const trackCyclesCheckbox = document.getElementById('trackCycles');
        const progressRing = document.querySelector('.progress-ring__path');
        const notificationCheckbox = document.getElementById('enableNotifications');
        const notificationSetting = document.querySelector('.notification-setting');
        const notificationStatus = document.getElementById('notificationStatus');
        const toast = document.getElementById('toast');

        // Progress ring setup
        const radius = 45;
        const circumference = radius * 2 * Math.PI;
        progressRing.style.strokeDasharray = `${circumference} ${circumference}`;
        progressRing.style.strokeDashoffset = circumference;

        // Store timer state in localStorage
        function saveTimerState() {
            const state = {
                isRunning,
                mode,
                timeLeft,
                currentCycle,
                isFirstStart,
                startTime: Date.now(),
                settings
            };
            localStorage.setItem('timerState', JSON.stringify(state));
        }

        // Load timer state from localStorage
        function loadTimerState() {
            const savedState = localStorage.getItem('timerState');
            if (savedState) {
                const state = JSON.parse(savedState);
                const elapsedTime = Math.floor((Date.now() - state.startTime) / 1000);
                
                settings = state.settings;
                mode = state.mode;
                currentCycle = state.currentCycle;
                isFirstStart = state.isFirstStart;
                
                if (state.isRunning) {
                    timeLeft = Math.max(0, state.timeLeft - elapsedTime);
                    if (timeLeft > 0) {
                        isRunning = true;
                        startTimer();
                    } else {
                        handleTimerComplete();
                    }
                } else {
                    timeLeft = state.timeLeft;
                }
                
                updateDisplay();
                updateModeButtons();
                updatePlayPauseIcon();
            }
        }

        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        function showToast(message, duration = 3000) {
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(() => {
                toast.classList.remove('visible');
            }, duration);
        }

        function formatTimeForButtons(minutes) {
            if (minutes >= 60) {
                return "1 h";
            }
            return `${minutes} m`;
        }

        function updateModeButtonsState() {
            const disabled = isRunning;
            focusButton.style.opacity = disabled ? '0.5' : '1';
            breakButton.style.opacity = disabled ? '0.5' : '1';
            focusButton.style.cursor = disabled ? 'not-allowed' : 'pointer';
            breakButton.style.cursor = disabled ? 'not-allowed' : 'pointer';
        }

        async function checkNotificationSupport() {
            if (!('Notification' in window)) {
                notificationStatus.textContent = 'This browser does not support desktop notifications';
                notificationStatus.classList.add('visible');
                notificationCheckbox.disabled = true;
                return false;
            }

            if (Notification.permission === 'denied') {
                notificationStatus.textContent = 'Notifications are blocked. Please enable them in your browser settings.';
                notificationStatus.classList.add('visible');
                notificationCheckbox.disabled = true;
                return false;
            }

            return true;
        }

        async function requestNotificationPermission() {
            try {
                if (!await checkNotificationSupport()) {
                    notificationCheckbox.checked = false;
                    settings.enableNotifications = false;
                    return false;
                }

                if (Notification.permission === 'granted') {
                    notificationStatus.classList.remove('visible');
                    return true;
                }

                const permission = await Notification.requestPermission();
                
                if (permission === 'granted') {
                    notificationStatus.classList.remove('visible');
                    new Notification("Pomodoro Timer", {
                        body: "Notifications are now enabled! You'll be notified when your sessions end.",
                        icon: settings.notificationIcon
                    });
                    return true;
                } else {
                    notificationCheckbox.checked = false;
                    settings.enableNotifications = false;
                    if (permission === 'denied') {
                        notificationStatus.textContent = 'Notifications are blocked. Please enable them in your browser settings.';
                        notificationStatus.classList.add('visible');
                        showToast('Please enable notifications in your browser settings to receive alerts.');
                    }
                    return false;
                }
            } catch (error) {
                console.error('Error requesting notification permission:', error);
                notificationStatus.textContent = 'There was an error setting up notifications. Please try again.';
                notificationStatus.classList.add('visible');
                notificationCheckbox.checked = false;
                settings.enableNotifications = false;
                return false;
            }
        }

        function sendNotification(title, body) {
            if (!settings.enableNotifications || Notification.permission !== 'granted') return;

            try {
                const notification = new Notification(title, {
                    body: body,
                    icon: settings.notificationIcon,
                    badge: settings.notificationIcon,
                    silent: false,
                    requireInteraction: false
                });

                setTimeout(() => notification.close(), 5000);

                notification.onclick = function(event) {
                    event.preventDefault();
                    window.focus();
                    notification.close();
                };
            } catch (error) {
                console.error('Error sending notification:', error);
                showToast('Failed to send notification');
            }
        }

        function updatePlayPauseIcon() {
            document.querySelector('.play-icon').style.display = isRunning ? 'none' : 'block';
            document.querySelector('.pause-icon').style.display = isRunning ? 'block' : 'none';
        }

        function setProgress(percent) {
            const offset = circumference - (percent / 100 * circumference);
            progressRing.style.strokeDashoffset = offset;
        }

        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            timeDisplay.textContent = formatTime(timeLeft);
            
            if (settings.trackCycles) {
                cycleDisplay.textContent = `Cycle ${currentCycle}/${settings.cyclesBeforeLongBreak}`;
                cycleDisplay.style.display = 'block';
            } else {
                cycleDisplay.style.display = 'none';
            }

            const totalTime = mode === 'focus' ? 
                settings.focusTime * 60 : 
                (currentCycle === settings.cyclesBeforeLongBreak ? settings.longBreak : settings.breakTime) * 60;
            
            const progress = ((totalTime - timeLeft) / totalTime) * 100;
            setProgress(progress);
            
            // Save state after display update
            saveTimerState();
        }

        function updateModeButtons() {
            const breakTime = currentCycle === settings.cyclesBeforeLongBreak ? 
                settings.longBreak : settings.breakTime;
            focusButton.textContent = `Focus ${formatTimeForButtons(settings.focusTime)}`;
            breakButton.textContent = `Break ${formatTimeForButtons(breakTime)}`;
        }

        function handleTimerComplete() {
            if (mode === 'focus') {
                if (isFirstStart) {
                    currentCycle = 1;
                    isFirstStart = false;
                } else if (currentCycle < settings.cyclesBeforeLongBreak) {
                    currentCycle++;
                }
                
                mode = 'break';
                const isLongBreak = currentCycle === settings.cyclesBeforeLongBreak;
                timeLeft = isLongBreak ? settings.longBreak * 60 : settings.breakTime * 60;
                
                sendNotification(
                    'Break Time',
                    `Time for a ${isLongBreak ? 'long' : 'short'} break!`
                );
            } else {
                mode = 'focus';
                if (currentCycle === settings.cyclesBeforeLongBreak) {
                    currentCycle = 0;
                    isFirstStart = true;
                }
                timeLeft = settings.focusTime * 60;
                
                sendNotification(
                    'Focus Time',
                    'Break\'s over! Time to focus.'
                );
            }
            
            updateModeButtons();
            updateDisplay();
            focusButton.classList.toggle('active');
            breakButton.classList.toggle('active');
            
            if (isRunning) {
                startTimer();
            }
        }

        function startTimer() {
            if (timerId) {
                clearInterval(timerId);
            }

            lastUpdateTime = Date.now();
            timerId = setInterval(() => {
                const now = Date.now();
                const delta = Math.floor((now - lastUpdateTime) / 1000);
                lastUpdateTime = now;

                if (delta > 0) {
                    timeLeft = Math.max(0, timeLeft - delta);
                    updateDisplay();

                    if (timeLeft === 0) {
                        handleTimerComplete();
                    }
                }
            }, 100);  // Update more frequently to catch up with missed time
        }

        function stopTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
            saveTimerState();
        }

        // Event Listeners
        toggleButton.addEventListener('click', () => {
            isRunning = !isRunning;
            updatePlayPauseIcon();
            updateModeButtonsState();
            
            if (isRunning) {
                startTimer();
            } else {
                stopTimer();
            }
            saveTimerState();
        });

        resetButton.addEventListener('click', () => {
            isRunning = false;
            timeLeft = mode === 'focus' ? settings.focusTime * 60 : settings.breakTime * 60;
            updatePlayPauseIcon();
            updateModeButtonsState();
            stopTimer();
            updateDisplay();
        });

        focusButton.addEventListener('click', () => {
            if (isRunning) return;
            if (mode !== 'focus') {
                mode = 'focus';
                timeLeft = settings.focusTime * 60;
                focusButton.classList.add('active');
                breakButton.classList.remove('active');
                updateDisplay();
            }
        });

        breakButton.addEventListener('click', () => {
            if (isRunning) return;
            if (mode !== 'break') {
                mode = 'break';
                timeLeft = settings.breakTime * 60;
                focusButton.classList.remove('active');
                breakButton.classList.add('active');
                updateDisplay();
            }
        });

        settingsButton.addEventListener('click', () => {
            document.getElementById('focusTime').value = settings.focusTime;
            document.getElementById('breakTime').value = settings.breakTime;
            document.getElementById('longBreak').value = settings.longBreak;
            document.getElementById('trackCycles').checked = settings.trackCycles;
            document.getElementById('enableNotifications').checked = settings.enableNotifications;
            document.getElementById('cyclesBeforeLongBreak').value = settings.cyclesBeforeLongBreak;
            cycleSettings.classList.toggle('disabled', !settings.trackCycles);
            settingsModal.classList.add('visible');
        });

        closeModalButton.addEventListener('click', () => {
            settingsModal.classList.remove('visible');
        });

        trackCyclesCheckbox.addEventListener('change', () => {
            cycleSettings.classList.toggle('disabled', !trackCyclesCheckbox.checked);
        });

        notificationCheckbox?.addEventListener('change', async function() {
            if (this.checked) {
                const permissionGranted = await requestNotificationPermission();
                if (!permissionGranted) {
                    this.checked = false;
                    return;
                }
                settings.enableNotifications = true;
            } else {
                settings.enableNotifications = false;
            }
            saveTimerState();
        });

        function validateInput(input) {
            const value = input.value;
            const errorElement = document.getElementById(`${input.id}-error`);
            
            input.classList.remove('error');
            errorElement.classList.remove('visible');
            
            if (!value || !/^\d+$/.test(value)) {
                errorElement.textContent = 'Please enter a valid number';
                errorElement.classList.add('visible');
                return false;
            }
            
            const numValue = parseInt(value);
            const min = parseInt(input.getAttribute('min'));
            const max = parseInt(input.getAttribute('max'));
            
            if (numValue < min || numValue > max) {
                errorElement.textContent = `Value must be between ${min} and ${max}`;
                errorElement.classList.add('visible');
                return false;
            }
            
            return true;
        }

        saveButton.addEventListener('click', () => {
            const inputs = document.querySelectorAll('#settingsModal input[type="number"]');
            let isValid = true;

            inputs.forEach(input => {
                if (!validateInput(input)) {
                    isValid = false;
                }
            });

            if (isValid) {
                settings.focusTime = parseInt(document.getElementById('focusTime').value);
                settings.breakTime = parseInt(document.getElementById('breakTime').value);
                settings.longBreak = parseInt(document.getElementById('longBreak').value);
                settings.trackCycles = document.getElementById('trackCycles').checked;
                settings.enableNotifications = document.getElementById('enableNotifications').checked;
                settings.cyclesBeforeLongBreak = parseInt(document.getElementById('cyclesBeforeLongBreak').value);

                if (mode === 'focus') {
                    timeLeft = settings.focusTime * 60;
                } else {
                    timeLeft = (currentCycle === settings.cyclesBeforeLongBreak) ? 
                        settings.longBreak * 60 : settings.breakTime * 60;
                }

                // Reset cycle count if cycles setting changes
                if (currentCycle > settings.cyclesBeforeLongBreak) {
                    currentCycle = 0;
                    isFirstStart = true;
                }

                updateDisplay();
                updateModeButtons();
                settingsModal.classList.remove('visible');
                showToast('Settings saved successfully');
                saveTimerState();
            }
        });

        async function setupNotifications() {
            if ('Notification' in window) {
                notificationSetting.classList.add('visible');
                
                if (Notification.permission === 'granted') {
                    notificationCheckbox.checked = true;
                    settings.enableNotifications = true;
                    notificationStatus.classList.remove('visible');
                } else if (Notification.permission === 'denied') {
                    notificationCheckbox.checked = false;
                    notificationCheckbox.disabled = true;
                    notificationStatus.textContent = 'Notifications are blocked. Please enable them in your browser settings.';
                    notificationStatus.classList.add('visible');
                }
            } else {
                notificationSetting.classList.remove('visible');
                settings.enableNotifications = false;
            }
        }

        // Handle visibility change
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (isRunning) {
                    stopTimer();
                }
            } else {
                if (isRunning) {
                    startTimer();
                }
            }
        });

        // Initialize
        setupNotifications();
        loadTimerState();
        updateDisplay();
        updateModeButtons();
        updateModeButtonsState();
        cycleSettings.classList.toggle('disabled', !settings.trackCycles);
        trackCyclesCheckbox.checked = settings.trackCycles;
    </script>
</body>
</html>
