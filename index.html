<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --background-color: #f7f7f7;
            --text-color: #2d3436;
            --modal-background: rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .mode-buttons {
            margin-bottom: 2rem;
        }

        .mode-button {
            background: none;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 0.5rem 1.5rem;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            margin: 0 0.5rem;
            transition: all 0.3s ease;
        }

        .mode-button.active {
            background-color: var(--primary-color);
            color: white;
        }

        .timer-display {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 2rem auto;
        }

        .timer-circle {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring__circle {
            fill: none;
            stroke: #ddd;
            stroke-width: 4;
        }

        .progress-ring__path {
            fill: none;
            stroke: var(--primary-color);
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s ease;
        }

        .timer-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .time {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .cycle-count {
            font-size: 1rem;
            color: #666;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .control-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }

        .control-button:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-background);
            justify-content: center;
            align-items: center;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background-color: white;
            padding: 2rem;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .close-modal {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
        }

        .setting-group {
            margin-bottom: 1.5rem;
        }

        .setting-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .setting-group input[type="number"] {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .notification-setting {
            position: relative;
        }

        .notification-status {
            display: none;
            position: absolute;
            bottom: -20px;
            left: 0;
            font-size: 0.8rem;
            color: var(--primary-color);
        }

        .notification-status.visible {
            display: block;
        }

        .disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .save-button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s ease;
        }

        .save-button:hover {
            background-color: #ff5252;
        }

        .error-message {
            color: var(--primary-color);
            font-size: 0.8rem;
            margin-top: 0.25rem;
            min-height: 1rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .toast.visible {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="mode-buttons">
            <button id="focusButton" class="mode-button active">Focus 25m</button>
            <button id="breakButton" class="mode-button">Break 5m</button>
        </div>

        <div class="timer-display">
            <div class="timer-circle">
                <svg class="progress-ring" width="300" height="300">
                    <circle class="progress-ring__circle" cx="150" cy="150" r="45" stroke-width="4"/>
                    <circle class="progress-ring__path" cx="150" cy="150" r="45" stroke-width="4"/>
                </svg>
            </div>
            <div class="timer-content">
                <div id="timeDisplay" class="time">25:00</div>
                <div id="cycleDisplay" class="cycle-count">Cycle 1/2</div>
            </div>
        </div>

        <div class="control-buttons">
            <button id="toggleButton" class="control-button">
                <svg class="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <svg class="pause-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>
            <button id="settingsButton" class="control-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Settings</h2>
                <button class="close-modal">✕</button>
            </div>
            <div class="setting-group">
                <label for="focusTime">Focus Duration (minutes)</label>
                <input type="number" id="focusTime" min="1" max="60" value="25">
                <div class="error-message"></div>
            </div>
            <div class="setting-group">
                <label for="breakTime">Break Duration (minutes)</label>
                <input type="number" id="breakTime" min="1" max="30" value="5">
                <div class="error-message"></div>
            </div>
            <div class="setting-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="trackCycles" checked>
                    <label for="trackCycles">Track Cycles</label>
                </div>
            </div>
            <div id="cycleSettings" class="setting-group">
                <label for="cyclesBeforeLongBreak">Cycles before Long Break</label>
                <input type="number" id="cyclesBeforeLongBreak" min="1" max="10" value="2">
                <div class="error-message"></div>
            </div>
            <div class="setting-group">
                <label for="longBreak">Long Break Duration (minutes)</label>
                <input type="number" id="longBreak" min="1" max="60" value="15">
                <div class="error-message"></div>
            </div>
            <div class="setting-group notification-setting">
                <div class="checkbox-group">
                    <input type="checkbox" id="enableNotifications">
                    <label for="enableNotifications">Enable Notifications</label>
                </div>
                <div id="notificationStatus" class="notification-status"></div>
            </div>
            <button class="save-button">Save Settings</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
// Settings and State Management
let settings = {
    focusTime: 25,
    breakTime: 5,
    longBreak: 15,
    trackCycles: true,
    cyclesBeforeLongBreak: 2,
    enableNotifications: false
};

let timeLeft = settings.focusTime * 60;
let timerId = null;
let mode = 'focus';
let focusSessionsCompleted = 0;
let isRunning = false;

// DOM Elements
const timeDisplay = document.getElementById('timeDisplay');
const cycleDisplay = document.getElementById('cycleDisplay');
const toggleButton = document.getElementById('toggleButton');
const settingsButton = document.getElementById('settingsButton');
const focusButton = document.getElementById('focusButton');
const breakButton = document.getElementById('breakButton');
const modal = document.getElementById('settingsModal');
const closeModal = document.querySelector('.close-modal');
const saveButton = document.querySelector('.save-button');
const toast = document.getElementById('toast');
const playIcon = document.querySelector('.play-icon');
const pauseIcon = document.querySelector('.pause-icon');
const progressRing = document.querySelector('.progress-ring__path');

// Calculate progress ring parameters
const radius = 45;
const circumference = radius * 2 * Math.PI;
progressRing.style.strokeDasharray = `${circumference} ${circumference}`;
progressRing.style.strokeDashoffset = circumference;

// Timer Functions
function formatTime(seconds) {
    const minutes = Math.floor(seconds / 60);
    const remainingSeconds = seconds % 60;
    return `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
}

function formatTimeForNotification(minutes) {
    return `${minutes} minute${minutes !== 1 ? 's' : ''}`;
}

function setProgress(percent) {
    const offset = circumference - (percent / 100 * circumference);
    progressRing.style.strokeDashoffset = offset;
}

function updateDisplay() {
    timeDisplay.textContent = formatTime(timeLeft);
    
    if (settings.trackCycles) {
        // Show current cycle out of total cycles
        const currentCycle = Math.min(focusSessionsCompleted + 1, settings.cyclesBeforeLongBreak);
        cycleDisplay.textContent = `Cycle ${currentCycle}/${settings.cyclesBeforeLongBreak}`;
        cycleDisplay.style.display = 'block';
    } else {
        cycleDisplay.style.display = 'none';
    }

    const totalTime = mode === 'focus' ? 
        settings.focusTime * 60 : 
        (focusSessionsCompleted >= settings.cyclesBeforeLongBreak ? 
            settings.longBreak : settings.breakTime) * 60;
    
    const progress = ((totalTime - timeLeft) / totalTime) * 100;
    setProgress(progress);
}

function timerTick() {
    if (timeLeft > 0) {
        timeLeft--;
        updateDisplay();
    } else {
        clearInterval(timerId);
        
        if (mode === 'focus') {
            // Switch to break mode
            mode = 'break';
            
            // Only increment focus sessions after completing a focus session
            focusSessionsCompleted++;
            
            // Determine if it's time for a long break
            const isLongBreak = settings.trackCycles && 
                focusSessionsCompleted >= settings.cyclesBeforeLongBreak;
            
            timeLeft = isLongBreak ? 
                settings.longBreak * 60 : 
                settings.breakTime * 60;
            
            sendNotification(
                'Break Time',
                `Great work! Time to take a ${isLongBreak ? 'long ' : ''}break for ${
                    formatTimeForNotification(isLongBreak ? settings.longBreak : settings.breakTime)
                }.`
            );

            // Reset cycles counter after starting the long break
            if (isLongBreak) {
                focusSessionsCompleted = 0;
            }
        } else {
            // Switch back to focus mode
            mode = 'focus';
            timeLeft = settings.focusTime * 60;
            
            sendNotification(
                'Focus Time',
                `Break's over! Time to focus for ${formatTimeForNotification(settings.focusTime)}.`
            );
        }
        
        updateModeButtons();
        updateDisplay();
        focusButton.classList.toggle('active', mode === 'focus');
        breakButton.classList.toggle('active', mode === 'break');
        
        // Restart the timer immediately
        timerId = setInterval(timerTick, 1000);
    }
}

// UI Update Functions
function updateModeButtons() {
    focusButton.textContent = `Focus ${settings.focusTime}m`;
    breakButton.textContent = `Break ${settings.breakTime}m`;
}

function toggleTimer() {
    if (isRunning) {
        clearInterval(timerId);
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
    } else {
        timerId = setInterval(timerTick, 1000);
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
    }
    isRunning = !isRunning;
}

function switchMode(newMode) {
    if (mode === newMode) return;
    
    mode = newMode;
    clearInterval(timerId);
    isRunning = false;
    playIcon.style.display = 'block';
    pauseIcon.style.display = 'none';
    
    timeLeft = mode === 'focus' ? 
        settings.focusTime * 60 : 
        settings.breakTime * 60;
    
    focusButton.classList.toggle('active', mode === 'focus');
    breakButton.classList.toggle('active', mode === 'break');
    updateDisplay();
}

// Notification Functions
function requestNotificationPermission() {
    if (!('Notification' in window)) {
        document.getElementById('notificationStatus').textContent = 'Notifications not supported';
        return;
    }

    Notification.requestPermission().then(permission => {
        settings.enableNotifications = permission === 'granted';
        document.getElementById('enableNotifications').checked = settings.enableNotifications;
        document.getElementById('notificationStatus').textContent = 
            permission === 'granted' ? 'Notifications enabled' : 'Notifications disabled';
    });
}

function sendNotification(title, body) {
    if (settings.enableNotifications && Notification.permission === 'granted') {
        new Notification(title, { body });
    }
}

// Settings Management
function showToast(message) {
    toast.textContent = message;
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), 3000);
}

function validateSettings() {
    const inputs = {
        focusTime: document.getElementById('focusTime'),
        breakTime: document.getElementById('breakTime'),
        longBreak: document.getElementById('longBreak'),
        cyclesBeforeLongBreak: document.getElementById('cyclesBeforeLongBreak')
    };

    let isValid = true;

    for (const [key, input] of Object.entries(inputs)) {
        const value = parseInt(input.value);
        const errorElement = input.nextElementSibling;
        
        if (isNaN(value) || value < parseInt(input.min) || value > parseInt(input.max)) {
            errorElement.textContent = `Please enter a number between ${input.min} and ${input.max}`;
            isValid = false;
        } else {
            errorElement.textContent = '';
        }
    }

    return isValid;
}

function saveSettings() {
    if (!validateSettings()) return;

    settings = {
        focusTime: parseInt(document.getElementById('focusTime').value),
        breakTime: parseInt(document.getElementById('breakTime').value),
        longBreak: parseInt(document.getElementById('longBreak').value),
        trackCycles: document.getElementById('trackCycles').checked,
        cyclesBeforeLongBreak: parseInt(document.getElementById('cyclesBeforeLongBreak').value),
        enableNotifications: document.getElementById('enableNotifications').checked
    };

    updateModeButtons();
    timeLeft = mode === 'focus' ? settings.focusTime * 60 : settings.breakTime * 60;
    updateDisplay();
    modal.classList.remove('visible');
    showToast('Settings saved successfully');
}

// Event Listeners
toggleButton.addEventListener('click', toggleTimer);
focusButton.addEventListener('click', () => switchMode('focus'));
breakButton.addEventListener('click', () => switchMode('break'));
settingsButton.addEventListener('click', () => modal.classList.add('visible'));
closeModal.addEventListener('click', () => modal.classList.remove('visible'));
saveButton.addEventListener('click', saveSettings);
document.getElementById('enableNotifications').addEventListener('change', requestNotificationPermission);
document.getElementById('trackCycles').addEventListener('change', function() {
    document.getElementById('cycleSettings').classList.toggle('disabled', !this.checked);
});

// Initialize
updateModeButtons();
updateDisplay();
</script>
</body>
</html>
