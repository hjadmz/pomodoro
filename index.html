<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)">
    <title>Pomodoro Timer</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --checkbox-color: #007AFF;
            --bg-color: #ffffff;
            --text-color: #1f2937;
            --secondary-bg: #f3f4f6;
            --border-color: #e5e7eb;
            --modal-overlay: rgba(0, 0, 0, 0.5);
            --ring-bg: #e5e7eb;
            --focus-ring: rgba(59, 130, 246, 0.25);
            --error-color: #ef4444;
            --warning-color: #f59e0b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --text-color: #ffffff;
                --secondary-bg: #1f2937;
                --border-color: #374151;
                --modal-overlay: rgba(0, 0, 0, 0.7);
                --ring-bg: #374151;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 480px;
            width: 100%;
            padding: 2rem;
            background-color: var(--secondary-bg);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
                .mode-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .mode-button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.2s;
            font-size: 1rem;
            min-height: 44px;
        }

        .mode-button:hover {
            opacity: 0.9;
        }

        .mode-button.active {
            opacity: 1;
            font-weight: 600;
            background-color: var(--primary-color);
            color: white;
        }

        .timer-display {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .timer-circle {
            position: relative;
            width: 16rem;
            height: 16rem;
            margin: 0 auto;
        }

        .progress-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .progress-ring__circle {
            fill: none;
            stroke: var(--ring-bg);
            stroke-width: 4;
            stroke-linecap: round;
        }

        .progress-ring__path {
            fill: none;
            stroke: var(--primary-color);
            stroke-linecap: round;
            stroke-width: 4;
            transition: stroke-dashoffset 0.35s;
        }

        .timer-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }

        .time {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            line-height: 1;
        }

        .cycle-count {
            font-size: 0.875rem;
            opacity: 0.7;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .control-button {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            border: none;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            min-height: 44px;
        }

        .control-button:hover {
            background-color: var(--border-color);
        }

        .modal {
            position: fixed;
            inset: 0;
            background-color: var(--modal-overlay);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            z-index: 50;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-color);
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 28rem;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            padding: 0.5rem;
        }

        .setting-group {
            margin-bottom: 1.5rem;
        }

        .setting-group:last-child {
            margin-bottom: 0;
        }

        .setting-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .setting-group input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
            min-height: 44px;
        }

        .setting-group input[type="number"]:hover {
            border-color: var(--primary-color);
        }

        .setting-group input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .setting-group input[type="number"]::-webkit-inner-spin-button,
        .setting-group input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .setting-group input[type="number"] {
            -moz-appearance: textfield;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
            padding: 0.5rem 0;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-size: 16px;
            line-height: 1.5;
        }

        .checkbox-group input[type="checkbox"] {
            margin: 0;
            width: 20px;
            height: 20px;
            accent-color: var(--checkbox-color);
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .checkbox-group input[type="checkbox"]:disabled + label {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .notification-status {
            font-size: 0.875rem;
            margin-top: 0.25rem;
            color: var(--warning-color);
            display: none;
        }

        .notification-status.visible {
            display: block;
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .save-button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1.5rem;
            min-height: 44px;
        }

        .save-button:hover {
            background-color: #2563eb;
        }

        .save-button:focus {
            outline: none;
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .notification-setting {
            display: none;
        }

        .notification-setting.visible {
            display: block;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 1rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 1000;
            max-width: 300px;
            animation: slideIn 0.3s ease-out;
        }

        .toast.visible {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }

            .timer-circle {
                width: 12rem;
                height: 12rem;
            }

            .time {
                font-size: 2.5rem;
            }

            .modal-content {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="mode-buttons">
            <button id="focusButton" class="mode-button active">Focus 25 m</button>
            <button id="breakButton" class="mode-button">Break 5 m</button>
        </div>

        <div class="timer-display">
            <div class="timer-circle">
                <svg class="progress-ring" width="100%" height="100%" viewBox="0 0 100 100">
                    <circle class="progress-ring__circle" cx="50" cy="50" r="45"/>
                    <circle class="progress-ring__path" cx="50" cy="50" r="45"/>
                </svg>
                <div class="timer-content">
                    <div class="time" id="timeDisplay">25:00</div>
                    <div class="cycle-count" id="cycleDisplay">Cycle 0/4</div>
                </div>
            </div>
        </div>

        <div class="control-buttons">
            <button id="toggleButton" class="control-button">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M8 5v14l11-7z"/>
                </svg>
            </button>
            <button id="settingsButton" class="control-button">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Settings</h2>
                <button class="close-modal" id="closeModal">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="setting-group">
                <label for="focusTime">Focus Time (minutes)</label>
                <input type="number" id="focusTime" min="1" max="60" value="25" step="1">
                <div class="error-message" id="focusTimeError">Please enter a whole number between 1 and 60</div>
            </div>
            <div class="setting-group">
                <label for="breakTime">Break Time (minutes)</label>
                <input type="number" id="breakTime" min="1" max="60" value="5" step="1">
                <div class="error-message" id="breakTimeError">Please enter a whole number between 1 and 60</div>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="trackCycles">
                <label for="trackCycles">Track Pomodoro Cycles</label>
            </div>
            <div class="setting-group cycle-setting">
                <label for="cyclesBeforeLongBreak">Cycles before Long Break</label>
                <input type="number" id="cyclesBeforeLongBreak" min="1" max="10" value="4" step="1">
                <div class="error-message" id="cyclesError">Please enter a whole number between 1 and 10</div>
            </div>
            <div class="setting-group cycle-setting">
                <label for="longBreak">Long Break Time (minutes)</label>
                <input type="number" id="longBreak" min="1" max="60" value="15" step="1">
                <div class="error-message" id="longBreakError">Please enter a whole number between 1 and 60</div>
            </div>
            <div class="checkbox-group notification-setting">
                <input type="checkbox" id="enableNotifications">
                <label for="enableNotifications">Enable Notifications</label>
                <div class="notification-status" id="notificationStatus">
                    Notifications are blocked. Please enable them in your browser settings.
                </div>
            </div>
            <button class="save-button" id="saveSettings">Save Settings</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Default settings
        let settings = {
            focusTime: 25,
            breakTime: 5,
            longBreak: 15,
            trackCycles: false,
            cyclesBeforeLongBreak: 4,
            enableNotifications: false
        };

        // Timer state
        let timeLeft = settings.focusTime * 60;
        let timerId = null;
        let isRunning = false;
        let isFocusMode = true;
        let currentCycle = 0;
        let notificationPermission = 'default';

        // DOM Elements
        const timeDisplay = document.getElementById('timeDisplay');
        const cycleDisplay = document.getElementById('cycleDisplay');
        const toggleButton = document.getElementById('toggleButton');
        const settingsButton = document.getElementById('settingsButton');
        const focusButton = document.getElementById('focusButton');
        const breakButton = document.getElementById('breakButton');
        const settingsModal = document.getElementById('settingsModal');
        const closeModal = document.getElementById('closeModal');
        const saveSettingsButton = document.getElementById('saveSettings');
        const trackCyclesCheckbox = document.getElementById('trackCycles');
        const enableNotificationsCheckbox = document.getElementById('enableNotifications');
        const notificationStatus = document.getElementById('notificationStatus');
        const toast = document.getElementById('toast');

        // SVG Circle elements
        const circle = document.querySelector('.progress-ring__path');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = circumference;

        // Load settings from localStorage
        function loadSettings() {
            const savedSettings = localStorage.getItem('pomodoroSettings');
            if (savedSettings) {
                settings = JSON.parse(savedSettings);
                updateSettingsUI();
            }
            timeLeft = settings.focusTime * 60;
            updateDisplay();
            updateCycleSettingsVisibility();
        }

        // Update settings UI
        function updateSettingsUI() {
            document.getElementById('focusTime').value = settings.focusTime;
            document.getElementById('breakTime').value = settings.breakTime;
            document.getElementById('longBreak').value = settings.longBreak;
            document.getElementById('cyclesBeforeLongBreak').value = settings.cyclesBeforeLongBreak;
            document.getElementById('trackCycles').checked = settings.trackCycles;
            document.getElementById('enableNotifications').checked = settings.enableNotifications;
            focusButton.textContent = `Focus ${settings.focusTime} m`;
            breakButton.textContent = `Break ${settings.breakTime} m`;
        }

        // Validate settings
        function validateSettings(newSettings) {
            let isValid = true;
            
            // Helper function to validate if a number is a positive integer
            function isPositiveInteger(value) {
                return Number.isInteger(value) && value > 0;
            }

            // Focus Time validation (1-60, whole numbers only)
            if (!isPositiveInteger(newSettings.focusTime) || newSettings.focusTime < 1 || newSettings.focusTime > 60) {
                document.getElementById('focusTimeError').classList.add('visible');
                isValid = false;
            } else {
                document.getElementById('focusTimeError').classList.remove('visible');
            }

            // Break Time validation (1-60, whole numbers only)
            if (!isPositiveInteger(newSettings.breakTime) || newSettings.breakTime < 1 || newSettings.breakTime > 60) {
                document.getElementById('breakTimeError').classList.add('visible');
                isValid = false;
            } else {
                document.getElementById('breakTimeError').classList.remove('visible');
            }

            // Long Break validation (1-60, whole numbers only)
            if (!isPositiveInteger(newSettings.longBreak) || newSettings.longBreak < 1 || newSettings.longBreak > 60) {
                document.getElementById('longBreakError').classList.add('visible');
                isValid = false;
            } else {
                document.getElementById('longBreakError').classList.remove('visible');
            }

            // Cycles validation (1-10, whole numbers only)
            if (!isPositiveInteger(newSettings.cyclesBeforeLongBreak) || 
                newSettings.cyclesBeforeLongBreak < 1 || 
                newSettings.cyclesBeforeLongBreak > 10) {
                document.getElementById('cyclesError').classList.add('visible');
                isValid = false;
            } else {
                document.getElementById('cyclesError').classList.remove('visible');
            }

            return isValid;
        }

        // Setup input validation
        function setupInputValidation() {
            const numberInputs = document.querySelectorAll('input[type="number"]');
            
            numberInputs.forEach(input => {
                input.addEventListener('input', (e) => {
                    // Remove any non-numeric characters
                    let value = e.target.value.replace(/[^0-9]/g, '');
                    
                    // Convert to number and ensure it's within bounds
                    let numValue = parseInt(value);
                    const min = parseInt(e.target.min);
                    const max = parseInt(e.target.max);
                    
                    if (numValue < min) numValue = min;
                    if (numValue > max) numValue = max;
                    
                    // Update input value
                    e.target.value = numValue || '';
                });

                // Prevent decimal point and e/E
                input.addEventListener('keydown', (e) => {
                    if (e.key === '.' || e.key.toLowerCase() === 'e') {
                        e.preventDefault();
                    }
                });
            });
        }

        // Save settings
        function saveSettings() {
            // Get and sanitize all settings values
            const newSettings = {
                focusTime: Math.floor(Math.max(1, Math.min(60, parseInt(document.getElementById('focusTime').value) || 25))),
                breakTime: Math.floor(Math.max(1, Math.min(60, parseInt(document.getElementById('breakTime').value) || 5))),
                longBreak: Math.floor(Math.max(1, Math.min(60, parseInt(document.getElementById('longBreak').value) || 15))),
                trackCycles: document.getElementById('trackCycles').checked,
                cyclesBeforeLongBreak: Math.floor(Math.max(1, Math.min(10, parseInt(document.getElementById('cyclesBeforeLongBreak').value) || 4))),
                enableNotifications: document.getElementById('enableNotifications').checked
            };

            // Validate all values
            if (!validateSettings(newSettings)) {
                showToast('Please correct the errors in settings');
                return;
            }

            // Save settings
            settings = newSettings;
            localStorage.setItem('pomodoroSettings', JSON.stringify(settings));

            // Update UI
            resetTimer();
            updateCycleSettingsVisibility();
            settingsModal.classList.remove('visible');
            
            // Show success toast
            showToast('Settings saved successfully!');
        }

        // Update cycle settings visibility
        function updateCycleSettingsVisibility() {
            const cycleSettings = document.querySelectorAll('.cycle-setting');
            cycleSettings.forEach(setting => {
                setting.style.display = settings.trackCycles ? 'block' : 'none';
            });
            updateCycleDisplay();
        }

        // Format time
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        // Update display
        function updateDisplay() {
            timeDisplay.textContent = formatTime(timeLeft);
            updateProgressRing();
            updateCycleDisplay();
        }

        // Update progress ring
        function updateProgressRing() {
            const totalTime = isFocusMode ? settings.focusTime * 60 : settings.breakTime * 60;
            const progress = 1 - (timeLeft / totalTime);
            const offset = circumference * progress;
            circle.style.strokeDashoffset = offset;
        }

        // Update cycle display
        function updateCycleDisplay() {
            if (settings.trackCycles) {
                cycleDisplay.textContent = `Cycle ${currentCycle}/${settings.cyclesBeforeLongBreak}`;
                cycleDisplay.style.display = 'block';
            } else {
                cycleDisplay.style.display = 'none';
            }
        }

        // Timer tick
        function timerTick() {
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
            } else {
                handleTimerComplete();
            }
        }

        // Handle timer complete
        function handleTimerComplete() {
            if (isFocusMode) {
                if (settings.trackCycles) {
                    currentCycle = (currentCycle + 1) % (settings.cyclesBeforeLongBreak + 1);
                }
                
                if (settings.trackCycles && currentCycle === 0) {
                    timeLeft = settings.longBreak * 60;
                    showNotification('Time for a long break!');
                } else {
                    timeLeft = settings.breakTime * 60;
                    showNotification('Time for a break!');
                }
            } else {
                timeLeft = settings.focusTime * 60;
                showNotification('Time to focus!');
            }
            
            isFocusMode = !isFocusMode;
            updateModeButtons();
            updateDisplay();
            stopTimer();
        }

        // Start timer
        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                timerId = setInterval(timerTick, 1000);
                toggleButton.innerHTML = '<svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
            }
        }

        // Stop timer
        function stopTimer() {
            if (isRunning) {
                isRunning = false;
                clearInterval(timerId);
                toggleButton.innerHTML = '<svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>';
            }
        }

        // Reset timer
        function resetTimer() {
            stopTimer();
            timeLeft = settings.focusTime * 60;
            isFocusMode = true;
            updateDisplay();
            updateModeButtons();
        }

        // Update mode buttons
        function updateModeButtons() {
            focusButton.classList.toggle('active', isFocusMode);
            breakButton.classList.toggle('active', !isFocusMode);
        }

        // Show notification
        function showNotification(message) {
            if (settings.enableNotifications && notificationPermission === 'granted') {
                new Notification('Pomodoro Timer', { body: message });
            }
            showToast(message);
        }

        // Show toast
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(() => {
                toast.classList.remove('visible');
            }, 3000);
        }

        // Check notification permission
        async function checkNotificationPermission() {
            if ('Notification' in window) {
                notificationPermission = await Notification.permission;
                if (notificationPermission === 'denied') {
                    notificationStatus.classList.add('visible');
                    enableNotificationsCheckbox.checked = false;
                    enableNotificationsCheckbox.disabled = true;
                }
            } else {
                notificationStatus.textContent = 'Notifications are not supported in this browser.';
                notificationStatus.classList.add('visible');
                enableNotificationsCheckbox.checked = false;
                enableNotificationsCheckbox.disabled = true;
            }
        }

        // Request notification permission
        async function requestNotificationPermission() {
            if ('Notification' in window && notificationPermission === 'default') {
                notificationPermission = await Notification.requestPermission();
                if (notificationPermission === 'granted') {
                    settings.enableNotifications = true;
                    showToast('Notifications enabled');
                } else {
                    settings.enableNotifications = false;
                    enableNotificationsCheckbox.checked = false;
                    notificationStatus.classList.add('visible');
                }
            }
        }

        // Event Listeners
        toggleButton.addEventListener('click', () => isRunning ? stopTimer() : startTimer());
        settingsButton.addEventListener('click', () => settingsModal.classList.add('visible'));
        closeModal.addEventListener('click', () => settingsModal.classList.remove('visible'));
        saveSettingsButton.addEventListener('click', saveSettings);

        focusButton.addEventListener('click', () => {
            if (!isFocusMode) {
                stopTimer();
                isFocusMode = true;
                timeLeft = settings.focusTime * 60;
                updateDisplay();
                updateModeButtons();
            }
        });

        breakButton.addEventListener('click', () => {
            if (isFocusMode) {
                stopTimer();
                isFocusMode = false;
                timeLeft = settings.breakTime * 60;
                updateDisplay();
                updateModeButtons();
            }
        });

        trackCyclesCheckbox.addEventListener('change', updateCycleSettingsVisibility);
        enableNotificationsCheckbox.addEventListener('change', async (e) => {
            if (e.target.checked) {
                await requestNotificationPermission();
            }
        });

        // Initialize
        loadSettings();
        setupInputValidation();
        checkNotificationPermission();
        updateModeButtons();
    </script>
</body>
</html>
