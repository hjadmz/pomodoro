<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .timer {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 2rem;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring__path {
            stroke: #4CAF50;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s ease;
        }

        .time-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            font-weight: bold;
        }

        .cycle-display {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 1rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        button {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #45a049;
        }

        button.active {
            background: #45a049;
        }

        .mode-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        /* Settings Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            position: relative;
            background: white;
            margin: 15% auto;
            padding: 2rem;
            width: 80%;
            max-width: 500px;
            border-radius: 0.5rem;
        }

        .close-modal {
            position: absolute;
            right: 1rem;
            top: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .settings-form {
            display: grid;
            gap: 1rem;
        }

        .settings-form label {
            display: grid;
            gap: 0.5rem;
        }

        .settings-form input {
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 0.3rem;
        }

        .icon {
            width: 24px;
            height: 24px;
        }

        .play-icon, .pause-icon {
            display: none;
        }

        .play-icon {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="timer">
            <svg class="progress-ring" width="300" height="300">
                <circle
                    class="progress-ring__path"
                    stroke-width="8"
                    stroke="#4CAF50"
                    fill="transparent"
                    r="140"
                    cx="150"
                    cy="150"
                />
            </svg>
            <div class="time-display" id="timeDisplay">25:00</div>
        </div>
        
        <div class="cycle-display" id="cycleDisplay">Cycle 0/2</div>
        
        <div class="mode-buttons">
            <button id="focusButton">Focus</button>
            <button id="breakButton">Break</button>
        </div>
        
        <div class="controls">
            <button id="toggleButton">
                <span class="play-icon">▶</span>
                <span class="pause-icon">⏸</span>
            </button>
            <button id="resetButton">Reset</button>
            <button id="settingsButton">⚙</button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Settings</h2>
            <div class="settings-form">
                <label>
                    Focus Time (minutes)
                    <input type="number" id="focusTime" min="1" max="60">
                </label>
                <label>
                    Break Time (minutes)
                    <input type="number" id="breakTime" min="1" max="60">
                </label>
                <label>
                    Long Break Time (minutes)
                    <input type="number" id="longBreak" min="1" max="60">
                </label>
                <label>
                    Cycles Before Long Break
                    <input type="number" id="cyclesBeforeLongBreak" min="1" max="10">
                </label>
                <label>
                    Enable Notifications
                    <input type="checkbox" id="enableNotifications">
                </label>
                <button class="save-button">Save Settings</button>
            </div>
        </div>
    </div>

    <script>
        // Device detection
        const deviceInfo = {
            isMobile: /iPhone|iPad|iPod|Android/i.test(navigator.userAgent),
            isSafari: /^((?!chrome|android).)*safari/i.test(navigator.userAgent),
            isIOS: /iPad|iPhone|iPod/.test(navigator.userAgent),
            isMac: /Mac/.test(navigator.platform),
            isWindows: /Win/.test(navigator.platform)
        };

        // Settings object
        let settings = {
            focusTime: 25,
            breakTime: 5,
            longBreak: 15,
            trackCycles: true,
            cyclesBeforeLongBreak: 2,
            notifications: true
        };

        // Timer state variables
        let timeLeft = settings.focusTime * 60;
        let mode = 'focus';
        let isLongBreak = false;
        let currentCycle = 0;
        let timerId = null;
        let isRunning = false;

        // Store last times for each mode
        let savedTimes = {
            focus: settings.focusTime * 60,
            break: settings.breakTime * 60,
            longBreak: settings.longBreak * 60
        };

        // DOM Elements
        const timeDisplay = document.getElementById('timeDisplay');
        const cycleDisplay = document.getElementById('cycleDisplay');
        const toggleButton = document.getElementById('toggleButton');
        const resetButton = document.getElementById('resetButton');
        const focusButton = document.getElementById('focusButton');
        const breakButton = document.getElementById('breakButton');
        const settingsButton = document.getElementById('settingsButton');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettingsButton = document.querySelector('.close-modal');
        const saveSettingsButton = document.querySelector('.save-button');
        const progressRing = document.querySelector('.progress-ring__path');
        const playIcon = document.querySelector('.play-icon');
        const pauseIcon = document.querySelector('.pause-icon');

        // Calculate progress ring properties
        const radius = progressRing.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        progressRing.style.strokeDasharray = `${circumference} ${circumference}`;
        progressRing.style.strokeDashoffset = circumference;

        // Utility Functions
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        function setProgress(percent) {
            const offset = circumference - (percent / 100 * circumference);
            progressRing.style.strokeDashoffset = offset;
        }

        function togglePlayPauseIcon(isPlaying) {
            playIcon.style.display = isPlaying ? 'none' : 'block';
            pauseIcon.style.display = isPlaying ? 'block' : 'none';
        }

        // Core timer functions
        function updateDisplay() {
            timeDisplay.textContent = formatTime(timeLeft);
            
            if (settings.trackCycles) {
                cycleDisplay.textContent = `Cycle ${currentCycle}/${settings.cyclesBeforeLongBreak}`;
                cycleDisplay.style.display = 'block';
            } else {
                cycleDisplay.style.display = 'none';
            }

            const totalTime = mode === 'focus' ? 
                settings.focusTime * 60 : 
                (isLongBreak ? settings.longBreak : settings.breakTime) * 60;
            
            const progress = ((totalTime - timeLeft) / totalTime) * 100;
            setProgress(progress);
        }

        function updateModeButtons() {
            focusButton.classList.toggle('active', mode === 'focus');
            breakButton.classList.toggle('active', mode === 'break' || isLongBreak);
        }

        function saveCurrentTime() {
            if (mode === 'focus') {
                savedTimes.focus = timeLeft;
            } else if (isLongBreak) {
                savedTimes.longBreak = timeLeft;
            } else {
                savedTimes.break = timeLeft;
            }
        }

        function switchMode(newMode, force = false) {
            if (mode === newMode && !force) return;
            
            // Save current time before switching
            saveCurrentTime();
            
            mode = newMode;
            
            if (mode === 'focus') {
                timeLeft = savedTimes.focus;
            } else {
                if (currentCycle >= settings.cyclesBeforeLongBreak && mode === 'break') {
                    isLongBreak = true;
                    timeLeft = savedTimes.longBreak;
                    currentCycle = 0;
                } else {
                    isLongBreak = false;
                    timeLeft = savedTimes.break;
                }
            }
            
            updateDisplay();
            updateModeButtons();
        }

        function startTimer() {
            if (isRunning) return;
            
            isRunning = true;
            togglePlayPauseIcon(true);
            
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    isRunning = false;
                    togglePlayPauseIcon(false);
                    
                    if (mode === 'focus') {
                        currentCycle++;
                        savedTimes.focus = settings.focusTime * 60;
                        switchMode('break', true);
                    } else {
                        savedTimes[isLongBreak ? 'longBreak' : 'break'] = 
                            (isLongBreak ? settings.longBreak : settings.breakTime) * 60;
                        switchMode('focus', true);
                    }
                    
                    if (settings.notifications) {
                        const message = `${mode.charAt(0).toUpperCase() + mode.slice(1)} time is up!`;
                        if ("Notification" in window && Notification.permission === "granted") {
                            new Notification(message);
                        }
                    }
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;
            clearInterval(timerId);
            isRunning = false;
            togglePlayPauseIcon(false);
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            togglePlayPauseIcon(false);
            
            savedTimes = {
                focus: settings.focusTime * 60,
                break: settings.breakTime * 60,
                longBreak: settings.longBreak * 60
            };
            
            mode = 'focus';
            isLongBreak = false;
            currentCycle = 0;
            timeLeft = savedTimes.focus;
            
            updateDisplay();
            updateModeButtons();
        }

        // Event Listeners
        toggleButton.addEventListener('click', () => {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        });

        resetButton.addEventListener('click', resetTimer);
        focusButton.addEventListener('click', () => switchMode('focus'));
        breakButton.addEventListener('click', () => switchMode('break'));

        settingsButton.addEventListener('click', () => {
            pauseTimer();
            settingsModal.style.display = 'block';
            
            document.getElementById('focusTime').value = settings.focusTime;
            document.getElementById('breakTime').value = settings.breakTime;
            document.getElementById('longBreak').value = settings.longBreak;
            document.getElementById('cyclesBeforeLongBreak').value = settings.cyclesBeforeLongBreak;
            document.getElementById('enableNotifications').checked = settings.notifications;
        });

        closeSettingsButton.addEventListener('click', () => {
            settingsModal.style.display = 'none';
        });

        saveSettingsButton.addEventListener('click', () => {
            settings.focusTime = parseInt(document.getElementById('focusTime').value);
            settings.breakTime = parseInt(document.getElementById('breakTime').value);
            settings.longBreak = parseInt(document.getElementById('longBreak').value);
            settings.cyclesBeforeLongBreak = parseInt(document.getElementById('cyclesBeforeLongBreak').value);
            settings.notifications = document.getElementById('enableNotifications').checked;
            
            if (savedTimes.focus === settings.focusTime * 60) {
                savedTimes.focus = settings.focusTime * 60;
            }
            if (savedTimes.break === settings.breakTime * 60) {
                savedTimes.break = settings.breakTime * 60;
            }
            if (savedTimes.longBreak === settings.longBreak * 60) {
                savedTimes.longBreak = settings.longBreak * 60;
            }
            
            settingsModal.style.display = 'none';
            updateDisplay();
        });

        // Handle notifications permission
        if ("Notification" in window) {
            if (Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            resetTimer();
            updateDisplay();
            updateModeButtons();
        });

        // Handle window focus/blur
        window.addEventListener('blur', () => {
            if (isRunning) {
                pauseTimer();
            }
        });
    </script>
</body>
</html>
