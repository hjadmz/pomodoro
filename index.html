<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)">
    <title>Pomodoro Timer</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --checkbox-color: #007AFF;
            --bg-color: #ffffff;
            --text-color: #1f2937;
            --secondary-bg: #f3f4f6;
            --border-color: #e5e7eb;
            --modal-overlay: rgba(0, 0, 0, 0.5);
            --ring-bg: #e5e7eb;
            --focus-ring: rgba(59, 130, 246, 0.25);
            --error-color: #ef4444;
            --warning-color: #f59e0b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --text-color: #ffffff;
                --secondary-bg: #1f2937;
                --border-color: #374151;
                --modal-overlay: rgba(0, 0, 0, 0.7);
                --ring-bg: #374151;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 480px;
            width: 100%;
            padding: 2rem;
            background-color: var(--secondary-bg);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .mode-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .mode-button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.2s;
            font-size: 1rem;
            min-height: 44px;
        }

        .mode-button:hover {
            opacity: 0.9;
        }

        .mode-button.active {
            opacity: 1;
            font-weight: 600;
            background-color: var(--primary-color);
            color: white;
        }

        .timer-display {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .timer-circle {
            position: relative;
            width: 16rem;
            height: 16rem;
            margin: 0 auto;
        }

        .timer-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }

        .time {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            line-height: 1;
        }

        .cycle-count {
            font-size: 0.875rem;
            opacity: 0.7;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring__circle {
            fill: none;
            stroke: var(--ring-bg);
            stroke-width: 4;
        }

        .progress-ring__path {
            fill: none;
            stroke: var(--primary-color);
            stroke-linecap: round;
            stroke-width: 4;
            transition: stroke-dashoffset 0.35s;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .control-button {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            border: none;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            min-height: 44px;
        }

        .control-button:hover {
            background-color: var(--border-color);
        }

        .modal {
            position: fixed;
            inset: 0;
            background-color: var(--modal-overlay);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            z-index: 50;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-color);
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 28rem;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            padding: 0.5rem;
        }

        .setting-group {
            margin-bottom: 1.5rem;
        }

        .setting-group:last-child {
            margin-bottom: 0;
        }

        .setting-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .setting-group input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
            min-height: 44px;
        }

        .setting-group input[type="number"]:hover {
            border-color: var(--primary-color);
        }

        .setting-group input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .setting-group input[type="number"]::-webkit-inner-spin-button,
        .setting-group input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .setting-group input[type="number"] {
            -moz-appearance: textfield;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
            padding: 0.5rem 0;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-size: 16px;
            line-height: 1.5;
        }

        .checkbox-group input[type="checkbox"] {
            margin: 0;
            width: 20px;
            height: 20px;
            accent-color: var(--checkbox-color);
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .checkbox-group input[type="checkbox"]:disabled + label {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal-footer {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 44px;
        }

        .button-secondary {
            background-color: var(--secondary-bg);
            color: var(--text-color);
        }

        .button-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .button:hover {
            opacity: 0.9;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 100;
        }

        .toast.visible {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translate(-50%, 100%);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        .error {
            color: var(--error-color);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }

        .error.visible {
            display: block;
        }

        .disabled {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode-buttons">
            <button class="mode-button active" id="focusButton">Focus</button>
            <button class="mode-button" id="breakButton">Break</button>
        </div>

        <div class="timer-display">
            <div class="timer-circle">
                <svg class="progress-ring" width="256" height="256">
                    <circle class="progress-ring__circle" cx="128" cy="128" r="120"/>
                    <circle class="progress-ring__path" cx="128" cy="128" r="120"/>
                </svg>
                <div class="timer-content">
                    <div class="time" id="timeDisplay">25:00</div>
                    <div class="cycle-count" id="cycleDisplay">Cycle 0/4</div>
                </div>
            </div>
        </div>

        <div class="control-buttons">
            <button class="control-button" id="settingsButton">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </button>
            <button class="control-button" id="toggleButton">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
            </button>
            <button class="control-button" id="resetButton">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 2v6h6"/>
                    <path d="M3 13a9 9 0 1 0 3-7.7L3 8"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Settings</h2>
                <button class="close-modal" id="closeModal">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="setting-group">
                <label for="focusTime">Focus Time (minutes)</label>
                <input type="number" id="focusTime" min="1" max="60" value="25">
                <div class="error" id="focusTimeError">Please enter a value between 1 and 60</div>
            </div>
            <div class="setting-group">
                <label for="breakTime">Break Time (minutes)</label>
                <input type="number" id="breakTime" min="1" max="60" value="5">
                <div class="error" id="breakTimeError">Please enter a value between 1 and 60</div>
            </div>
            <div class="setting-group">
                <label for="cycles">Number of Cycles</label>
                <input type="number" id="cycles" min="1" max="10" value="4">
                <div class="error" id="cyclesError">Please enter a value between 1 and 10</div>
            </div>
            <div class="setting-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="autoStartBreaks">
                    <label for="autoStartBreaks">Auto-start Breaks</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="autoStartPomodoros">
                    <label for="autoStartPomodoros">Auto-start Pomodoros</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="notifications">
                    <label for="notifications">Show Desktop Notifications</label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="button button-secondary" id="cancelSettings">Cancel</button>
                <button class="button button-primary" id="saveSettings">Save Settings</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        class PomodoroTimer {
            constructor() {
                this.initialize();
                this.setupEventListeners();
            }

            initialize() {
                // DOM Elements
                this.timeDisplay = document.getElementById('timeDisplay');
                this.cycleDisplay = document.getElementById('cycleDisplay');
                this.toggleButton = document.getElementById('toggleButton');
                this.resetButton = document.getElementById('resetButton');
                this.focusButton = document.getElementById('focusButton');
                this.breakButton = document.getElementById('breakButton');
                this.settingsButton = document.getElementById('settingsButton');
                this.settingsModal = document.getElementById('settingsModal');
                this.closeModal = document.getElementById('closeModal');
                this.saveSettings = document.getElementById('saveSettings');
                this.cancelSettings = document.getElementById('cancelSettings');
                this.toast = document.getElementById('toast');
                this.progressRing = document.querySelector('.progress-ring__path');

                // Calculate progress ring circumference
                const radius = this.progressRing.r.baseVal.value;
                this.circumference = radius * 2 * Math.PI;
                this.progressRing.style.strokeDasharray = `${this.circumference} ${this.circumference}`;
                this.progressRing.style.strokeDashoffset = this.circumference;

                // Timer state
                this.isRunning = false;
                this.currentMode = 'focus';
                this.currentCycle = 0;
                this.timeRemaining = 0;
                this.timerId = null;

                // Load settings
                this.loadSettings();
                this.resetTimer();
            }

            loadSettings() {
                const defaultSettings = {
                    focusTime: 25,
                    breakTime: 5,
                    cycles: 4,
                    autoStartBreaks: false,
                    autoStartPomodoros: false,
                    notifications: true
                };

                this.settings = JSON.parse(localStorage.getItem('pomodoroSettings')) || defaultSettings;

                // Update settings inputs
                document.getElementById('focusTime').value = this.settings.focusTime;
                document.getElementById('breakTime').value = this.settings.breakTime;
                document.getElementById('cycles').value = this.settings.cycles;
                document.getElementById('autoStartBreaks').checked = this.settings.autoStartBreaks;
                document.getElementById('autoStartPomodoros').checked = this.settings.autoStartPomodoros;
                document.getElementById('notifications').checked = this.settings.notifications;
            }

            saveSettings() {
                const focusTime = parseInt(document.getElementById('focusTime').value);
                const breakTime = parseInt(document.getElementById('breakTime').value);
                const cycles = parseInt(document.getElementById('cycles').value);

                // Validate inputs
                if (!this.validateSettings(focusTime, breakTime, cycles)) {
                    return false;
                }

                this.settings = {
                    focusTime,
                    breakTime,
                    cycles,
                    autoStartBreaks: document.getElementById('autoStartBreaks').checked,
                    autoStartPomodoros: document.getElementById('autoStartPomodoros').checked,
                    notifications: document.getElementById('notifications').checked
                };

                localStorage.setItem('pomodoroSettings', JSON.stringify(this.settings));
                this.resetTimer();
                this.closeSettingsModal();
                this.showToast('Settings saved successfully');
                return true;
            }

            validateSettings(focusTime, breakTime, cycles) {
                let isValid = true;
                const errors = {
                    focusTime: document.getElementById('focusTimeError'),
                    breakTime: document.getElementById('breakTimeError'),
                    cycles: document.getElementById('cyclesError')
                };

                // Reset errors
                Object.values(errors).forEach(error => error.classList.remove('visible'));

                if (focusTime < 1 || focusTime > 60) {
                    errors.focusTime.classList.add('visible');
                    isValid = false;
                }

                if (breakTime < 1 || breakTime > 60) {
                    errors.breakTime.classList.add('visible');
                    isValid = false;
                }

                if (cycles < 1 || cycles > 10) {
                    errors.cycles.classList.add('visible');
                    isValid = false;
                }

                return isValid;
            }

            setupEventListeners() {
                this.toggleButton.addEventListener('click', () => this.toggleTimer());
                this.resetButton.addEventListener('click', () => this.resetTimer());
                this.focusButton.addEventListener('click', () => this.switchMode('focus'));
                this.breakButton.addEventListener('click', () => this.switchMode('break'));
                this.settingsButton.addEventListener('click', () => this.openSettingsModal());
                this.closeModal.addEventListener('click', () => this.closeSettingsModal());
                this.saveSettings.addEventListener('click', () => this.saveSettings());
                this.cancelSettings.addEventListener('click', () => this.closeSettingsModal());
                this.settingsModal.addEventListener('click', (e) => {
                    if (e.target === this.settingsModal) this.closeSettingsModal();
                });
            }

            toggleTimer() {
                if (this.isRunning) {
                    this.pauseTimer();
                } else {
                    this.startTimer();
                }
            }

            startTimer() {
                this.isRunning = true;
                this.updateToggleButton();
                
                this.timerId = setInterval(() => {
                    this.timeRemaining--;
                    this.updateDisplay();

                    if (this.timeRemaining <= 0) {
                        this.handleTimerComplete();
                    }
                }, 1000);
            }

            pauseTimer() {
                this.isRunning = false;
                this.updateToggleButton();
                clearInterval(this.timerId);
            }

            resetTimer() {
                this.pauseTimer();
                this.timeRemaining = this.currentMode === 'focus' ? 
                    this.settings.focusTime * 60 : 
                    this.settings.breakTime * 60;
                this.updateDisplay();
            }

            switchMode(mode) {
                if (mode === this.currentMode) return;

                this.currentMode = mode;
                this.focusButton.classList.toggle('active', mode === 'focus');
                this.breakButton.classList.toggle('active', mode === 'break');
                this.resetTimer();
            }

            handleTimerComplete() {
                this.pauseTimer();
                
                if (this.currentMode === 'focus') {
                    this.currentCycle++;
                    this.showNotification('Focus session complete!');
                    
                    if (this.currentCycle >= this.settings.cycles) {
                        this.currentCycle = 0;
                        this.showNotification('All cycles completed!');
                    } else if (this.settings.autoStartBreaks) {
                        this.switchMode('break');
                        this.startTimer();
                    } else {
                        this.switchMode('break');
                    }
                } else {
                    this.showNotification('Break time complete!');
                    if (this.settings.autoStartPomodoros) {
                        this.switchMode('focus');
                        this.startTimer();
                    } else {
                        this.switchMode('focus');
                    }
                }
            }

            updateDisplay() {
                const minutes = Math.floor(this.timeRemaining / 60);
                const seconds = this.timeRemaining % 60;
                this.timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                this.cycleDisplay.textContent = `Cycle ${this.currentCycle}/${this.settings.cycles}`;

                // Update progress ring
                const totalTime = this.currentMode === 'focus' ? 
                    this.settings.focusTime * 60 : 
                    this.settings.breakTime * 60;
                const progress = 1 - (this.timeRemaining / totalTime);
                const offset = this.circumference - (progress * this.circumference);
                this.progressRing.style.strokeDashoffset = offset;
            }

            updateToggleButton() {
                const icon = this.isRunning ? 
                    '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>' :
                    '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
                this.toggleButton.innerHTML = icon;
            }

            openSettingsModal() {
                this.settingsModal.classList.add('visible');
            }

            closeSettingsModal() {
                this.settingsModal.classList.remove('visible');
            }

            showToast(message) {
                this.toast.textContent = message;
                this.toast.classList.add('visible');
                setTimeout(() => {
                    this.toast.classList.remove('visible');
                }, 3000);
            }

            async showNotification(message) {
                if (!this.settings.notifications) return;

                if (Notification.permission === 'granted') {
                    new Notification('Pomodoro Timer', { body: message });
                } else if (Notification.permission !== 'denied') {
                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') {
                        new Notification('Pomodoro Timer', { body: message });
                    }
                }
            }
        }

        // Initialize the timer when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            new PomodoroTimer();
        });
    </script>
</body>
</html>
