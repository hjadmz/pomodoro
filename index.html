<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)">
    <title>Pomodoro Timer</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --checkbox-color: #007AFF;
            --bg-color: #ffffff;
            --text-color: #1f2937;
            --secondary-bg: #f3f4f6;
            --border-color: #e5e7eb;
            --modal-overlay: rgba(0, 0, 0, 0.5);
            --ring-bg: #e5e7eb;
            --focus-ring: rgba(59, 130, 246, 0.25);
            --error-color: #ef4444;
            --warning-color: #f59e0b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --text-color: #ffffff;
                --secondary-bg: #1f2937;
                --border-color: #374151;
                --modal-overlay: rgba(0, 0, 0, 0.7);
                --ring-bg: #374151;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 480px;
            width: 100%;
            padding: 2rem;
            background-color: var(--secondary-bg);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .mode-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .mode-button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.2s;
            font-size: 1rem;
            min-height: 44px;
        }

        .mode-button:hover {
            opacity: 0.9;
        }

        .mode-button.active {
            opacity: 1;
            font-weight: 600;
            background-color: var(--primary-color);
            color: white;
        }

        .timer-display {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .timer-circle {
            position: relative;
            width: 16rem;
            height: 16rem;
            margin: 0 auto;
        }

        .progress-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .progress-ring__circle {
            fill: none;
            stroke: var(--ring-bg);
            stroke-width: 4;
            stroke-linecap: round;
        }

        .progress-ring__path {
            fill: none;
            stroke: var(--primary-color);
            stroke-linecap: round;
            stroke-width: 4;
            transition: stroke-dashoffset 0.35s;
        }

        .timer-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }

        .time {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            line-height: 1;
        }

        .cycle-count {
            font-size: 0.875rem;
            opacity: 0.7;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .control-button {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            border: none;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            min-height: 44px;
        }

        .control-button:hover {
            background-color: var(--border-color);
        }

        .modal {
            position: fixed;
            inset: 0;
            background-color: var(--modal-overlay);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            z-index: 50;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-color);
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 28rem;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            padding: 0.5rem;
        }

        .setting-group {
            margin-bottom: 1.5rem;
        }

        .setting-group:last-child {
            margin-bottom: 0;
        }

        .setting-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .setting-group input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
            min-height: 44px;
        }

        .setting-group input[type="number"]:hover {
            border-color: var(--primary-color);
        }

        .setting-group input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .setting-group input[type="number"]::-webkit-inner-spin-button,
        .setting-group input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .setting-group input[type="number"] {
            -moz-appearance: textfield;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
            padding: 0.5rem 0;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-size: 16px;
            line-height: 1.5;
        }

        .checkbox-group input[type="checkbox"] {
            margin: 0;
            width: 20px;
            height: 20px;
            accent-color: var(--checkbox-color);
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .checkbox-group input[type="checkbox"]:disabled + label {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .notification-status {
            font-size: 0.875rem;
            margin-top: 0.25rem;
            color: var(--warning-color);
            display: none;
        }

        .notification-status.visible {
            display: block;
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .save-button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1.5rem;
            min-height: 44px;
        }

        .save-button:hover {
            background-color: #2563eb;
        }

        .save-button:focus {
            outline: none;
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .notification-setting {
            display: none;
        }

        .notification-setting.visible {
            display: block;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 1rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 1000;
            max-width: 300px;
            animation: slideIn 0.3s ease-out;
        }

        .toast.visible {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }

            .timer-circle {
                width: 12rem;
                height: 12rem;
            }

            .time {
                font-size: 2.5rem;
            }

            .modal-content {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="mode-buttons">
            <button id="focusButton" class="mode-button active">Focus 25 m</button>
            <button id="breakButton" class="mode-button">Break 5 m</button>
        </div>

        <div class="timer-display">
            <div class="timer-circle">
                <svg class="progress-ring" width="100%" height="100%" viewBox="0 0 100 100">
                    <circle class="progress-ring__circle" cx="50" cy="50" r="45"/>
                    <circle class="progress-ring__path" cx="50" cy="50" r="45"/>
                </svg>
                <div class="timer-content">
                    <div class="time" id="timeDisplay">25:00</div>
                    <div class="cycle-count" id="cycleDisplay">Cycle 0/4</div>
                </div>
            </div>
        </div>

        <div class="control-buttons">
            <button id="toggleButton" class="control-button">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M8 5v14l11-7z"/>
                </svg>
            </button>
            <button id="settingsButton" class="control-button">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.63-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Settings</h2>
                <button class="close-modal">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="setting-group">
                <label for="focusTime">Focus Time (minutes)</label>
                <input type="number" id="focusTime" min="1" max="60" value="25">
                <div class="error-message" id="focusTimeError">Please enter a value between 1 and 60</div>
            </div>
            <div class="setting-group">
                <label for="breakTime">Break Time (minutes)</label>
                <input type="number" id="breakTime" min="1" max="30" value="5">
                <div class="error-message" id="breakTimeError">Please enter a value between 1 and 30</div>
            </div>
            <div class="setting-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="trackCycles" checked>
                    <label for="trackCycles">Track Pomodoro Cycles</label>
                </div>
                <div class="setting-group cycle-setting">
                    <label for="cyclesBeforeLongBreak">Cycles before Long Break</label>
                    <input type="number" id="cyclesBeforeLongBreak" min="2" max="10" value="4">
                    <div class="error-message" id="cyclesError">Please enter a value between 2 and 10</div>
                </div>
                <div class="setting-group cycle-setting">
                    <label for="longBreak">Long Break Time (minutes)</label>
                    <input type="number" id="longBreak" min="5" max="45" value="15">
                    <div class="error-message" id="longBreakError">Please enter a value between 5 and 45</div>
                </div>
            </div>
            <div class="setting-group notification-setting">
                <div class="checkbox-group">
                    <input type="checkbox" id="enableNotifications">
                    <label for="enableNotifications">Enable Notifications</label>
                </div>
                <div class="notification-status" id="notificationStatus">
                    Notifications are blocked. Please enable them in your browser settings.
                </div>
            </div>
            <button class="save-button">Save Settings</button>
        </div>
    </div>

    <div id="toast" class="toast">Settings saved successfully!</div>

    <script>
        // DOM Elements
        const timeDisplay = document.getElementById('timeDisplay');
        const cycleDisplay = document.getElementById('cycleDisplay');
        const toggleButton = document.getElementById('toggleButton');
        const focusButton = document.getElementById('focusButton');
        const breakButton = document.getElementById('breakButton');
        const settingsButton = document.getElementById('settingsButton');
        const settingsModal = document.getElementById('settingsModal');
        const closeModalButton = document.querySelector('.close-modal');
        const toast = document.getElementById('toast');

        // Settings and State
        let settings = {
            focusTime: 25,
            breakTime: 5,
            longBreak: 15,
            trackCycles: true,
            cyclesBeforeLongBreak: 4,
            enableNotifications: false
        };

        let isRunning = false;
        let mode = 'focus';
        let timeLeft = settings.focusTime * 60;
        let currentCycle = 0;
        let timerId = null;
        let isLongBreak = false;

        // Initialize progress ring
        const circle = document.querySelector('.progress-ring__path');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = circumference;

        // Timer Functions
        function setProgress(percent) {
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        }

        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${String(minutes).padStart(2, '0')}:${String(remainingSeconds).padStart(2, '0')}`;
        }

        function updateDisplay() {
            timeDisplay.textContent = formatTime(timeLeft);
            if (settings.trackCycles) {
                cycleDisplay.textContent = `Cycle ${currentCycle}/${settings.cyclesBeforeLongBreak}`;
            }
            const totalTime = mode === 'focus' ? 
                settings.focusTime * 60 : 
                (isLongBreak ? settings.longBreak * 60 : settings.breakTime * 60);
            const progress = ((totalTime - timeLeft) / totalTime) * 100;
            setProgress(progress);
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerId);
                isRunning = false;
                toggleButton.innerHTML = '<svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>';
            } else {
                isRunning = true;
                toggleButton.innerHTML = '<svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
                timerId = setInterval(timerTick, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            timeLeft = mode === 'focus' ? 
                settings.focusTime * 60 : 
                (isLongBreak ? settings.longBreak * 60 : settings.breakTime * 60);
            toggleButton.innerHTML = '<svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>';
            updateDisplay();
        }

        function switchMode(newMode) {
            mode = newMode;
            isLongBreak = false;
            if (mode === 'focus') {
                focusButton.classList.add('active');
                breakButton.classList.remove('active');
                document.documentElement.style.setProperty('--primary-color', '#3b82f6');
            } else {
                if (settings.trackCycles && currentCycle >= settings.cyclesBeforeLongBreak) {
                    isLongBreak = true;
                    currentCycle = 0;
                }
                focusButton.classList.remove('active');
                breakButton.classList.add('active');
                document.documentElement.style.setProperty('--primary-color', '#10b981');
            }
            resetTimer();
        }

        function timerTick() {
            timeLeft--;
            updateDisplay();

            if (timeLeft <= 0) {
                clearInterval(timerId);
                isRunning = false;
                if (mode === 'focus') {
                    if (settings.trackCycles) {
                        currentCycle++;
                    }
                    if (settings.enableNotifications) {
                        new Notification('Focus session completed!', {
                            body: 'Time for a break!',
                            icon: 'icon-180.png'
                        });
                    }
                    switchMode('break');
                } else {
                    if (settings.enableNotifications) {
                        new Notification('Break time over!', {
                            body: 'Ready to focus?',
                            icon: 'icon-180.png'
                        });
                    }
                    switchMode('focus');
                }
            }
        }

        // Settings Management
        function loadSettings() {
            const savedSettings = localStorage.getItem('pomodoroSettings');
            if (savedSettings) {
                settings = JSON.parse(savedSettings);
                updateSettingsInputs();
            }
        }

        function saveSettings() {
            // Validate and get all settings values
            const newSettings = {
                focusTime: parseInt(document.getElementById('focusTime').value),
                breakTime: parseInt(document.getElementById('breakTime').value),
                longBreak: parseInt(document.getElementById('longBreak').value),
                trackCycles: document.getElementById('trackCycles').checked,
                cyclesBeforeLongBreak: parseInt(document.getElementById('cyclesBeforeLongBreak').value),
                enableNotifications: document.getElementById('enableNotifications').checked
            };

            // Validate all values
            if (!validateSettings(newSettings)) {
                return;
            }

            // Save settings
            settings = newSettings;
            localStorage.setItem('pomodoroSettings', JSON.stringify(settings));

            // Update UI
            resetTimer();
            updateCycleSettingsVisibility();
            settingsModal.classList.remove('visible');
            
            // Show toast
            showToast('Settings saved successfully!');
        }

        function validateSettings(newSettings) {
            let isValid = true;
            
            // Focus Time validation
            if (newSettings.focusTime < 1 || newSettings.focusTime > 60) {
                document.getElementById('focusTimeError').classList.add('visible');
                isValid = false;
            } else {
                document.getElementById('focusTimeError').classList.remove('visible');
            }

            // Break Time validation
            if (newSettings.breakTime < 1 || newSettings.breakTime > 30) {
                document.getElementById('breakTimeError').classList.add('visible');
                isValid = false;
            } else {
                document.getElementById('breakTimeError').classList.remove('visible');
            }

            // Long Break validation
            if (newSettings.longBreak < 5 || newSettings.longBreak > 45) {
                document.getElementById('longBreakError').classList.add('visible');
                isValid = false;
            } else {
                document.getElementById('longBreakError').classList.remove('visible');
            }

            // Cycles validation
            if (newSettings.cyclesBeforeLongBreak < 2 || newSettings.cyclesBeforeLongBreak > 10) {
                document.getElementById('cyclesError').classList.add('visible');
                isValid = false;
            } else {
                document.getElementById('cyclesError').classList.remove('visible');
            }

            return isValid;
        }

        function updateSettingsInputs() {
            document.getElementById('focusTime').value = settings.focusTime;
            document.getElementById('breakTime').value = settings.breakTime;
            document.getElementById('longBreak').value = settings.longBreak;
            document.getElementById('trackCycles').checked = settings.trackCycles;
            document.getElementById('cyclesBeforeLongBreak').value = settings.cyclesBeforeLongBreak;
            document.getElementById('enableNotifications').checked = settings.enableNotifications;
            updateCycleSettingsVisibility();
        }

        function updateCycleSettingsVisibility() {
            const cycleSettings = document.querySelectorAll('.cycle-setting');
            cycleSettings.forEach(setting => {
                setting.classList.toggle('disabled', !settings.trackCycles);
            });
            cycleDisplay.style.display = settings.trackCycles ? 'block' : 'none';
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(() => {
                toast.classList.remove('visible');
            }, 3000);
        }

        // Notification Management
        function setupNotifications() {
            const notificationSetting = document.querySelector('.notification-setting');
            const notificationStatus = document.getElementById('notificationStatus');
            const enableNotificationsCheckbox = document.getElementById('enableNotifications');

            if ('Notification' in window) {
                notificationSetting.classList.add('visible');

                if (Notification.permission === 'denied') {
                    notificationStatus.classList.add('visible');
                    enableNotificationsCheckbox.disabled = true;
                    settings.enableNotifications = false;
                }

                enableNotificationsCheckbox.addEventListener('change', async (e) => {
                    if (e.target.checked && Notification.permission !== 'granted') {
                        const permission = await Notification.requestPermission();
                        if (permission !== 'granted') {
                            e.target.checked = false;
                            notificationStatus.classList.add('visible');
                            enableNotificationsCheckbox.disabled = true;
                        }
                    }
                });
            }
        }

        // Event Listeners
        toggleButton.addEventListener('click', toggleTimer);
        focusButton.addEventListener('click', () => switchMode('focus'));
        breakButton.addEventListener('click', () => switchMode('break'));

        settingsButton.addEventListener('click', () => {
            updateSettingsInputs();
            settingsModal.classList.add('visible');
        });

        closeModalButton.addEventListener('click', () => {
            settingsModal.classList.remove('visible');
        });

        document.getElementById('trackCycles').addEventListener('change', (e) => {
            const cycleSettings = document.querySelectorAll('.cycle-setting');
            cycleSettings.forEach(setting => {
                setting.classList.toggle('disabled', !e.target.checked);
            });
        });

        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                settingsModal.classList.remove('visible');
            }
        });

        document.querySelector('.save-button').addEventListener('click', saveSettings);

        // Initialize
        loadSettings();
        setupNotifications();
        updateDisplay();
    </script>
</body>
</html>
