<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)">
    <title>Pomodoro Timer</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --checkbox-color: #007AFF;
            --bg-color: #ffffff;
            --text-color: #1f2937;
            --secondary-bg: #f3f4f6;
            --border-color: #e5e7eb;
            --modal-overlay: rgba(0, 0, 0, 0.5);
            --ring-bg: #e5e7eb;
            --focus-ring: rgba(59, 130, 246, 0.25);
            --error-color: #ef4444;
            --warning-color: #f59e0b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --text-color: #ffffff;
                --secondary-bg: #1f2937;
                --border-color: #374151;
                --modal-overlay: rgba(0, 0, 0, 0.7);
                --ring-bg: #374151;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 480px;
            width: 100%;
            padding: 2rem;
            background-color: var(--secondary-bg);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .mode-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .mode-button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.2s;
            font-size: 1rem;
            min-height: 44px;
        }

        .mode-button:hover {
            opacity: 0.9;
        }

        .mode-button.active {
            opacity: 1;
            font-weight: 600;
            background-color: var(--primary-color);
            color: white;
        }

        .timer-display {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .timer-circle {
            position: relative;
            width: 16rem;
            height: 16rem;
            margin: 0 auto;
        }

        .progress-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .progress-ring__circle {
            fill: none;
            stroke: var(--ring-bg);
            stroke-width: 4;
            stroke-linecap: round;
        }

        .progress-ring__path {
            fill: none;
            stroke: var(--primary-color);
            stroke-linecap: round;
            stroke-width: 4;
            transition: stroke-dashoffset 0.35s;
        }

        .timer-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }

        .time {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            line-height: 1;
        }

        .cycle-count {
            font-size: 0.875rem;
            opacity: 0.7;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .control-button {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            border: none;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            min-height: 44px;
        }

        .control-button:hover {
            background-color: var(--border-color);
        }

        .modal {
            position: fixed;
            inset: 0;
            background-color: var(--modal-overlay);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            z-index: 50;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-color);
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 28rem;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            padding: 0.5rem;
        }

        .setting-group {
            margin-bottom: 1.5rem;
        }

        .setting-group:last-child {
            margin-bottom: 0;
        }

        .setting-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .setting-group input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
            min-height: 44px;
        }

        .setting-group input[type="number"]:hover {
            border-color: var(--primary-color);
        }

        .setting-group input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .setting-group input[type="number"]::-webkit-inner-spin-button,
        .setting-group input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .setting-group input[type="number"] {
            -moz-appearance: textfield;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
            padding: 0.5rem 0;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-size: 16px;
            line-height: 1.5;
        }

        .checkbox-group input[type="checkbox"] {
            margin: 0;
            width: 20px;
            height: 20px;
            accent-color: var(--checkbox-color);
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .checkbox-group input[type="checkbox"]:disabled + label {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .notification-status {
            font-size: 0.875rem;
            margin-top: 0.25rem;
            color: var(--warning-color);
            display: none;
        }

        .notification-status.visible {
            display: block;
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .save-button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1.5rem;
            min-height: 44px;
        }

        .save-button:hover {
            background-color: #2563eb;
        }

        .save-button:focus {
            outline: none;
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .notification-setting {
            display: none;
        }

        .notification-setting.visible {
            display: block;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 1rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 1000;
            max-width: 300px;
            animation: slideIn 0.3s ease-out;
        }

        .toast.visible {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }

            .timer-circle {
                width: 12rem;
                height: 12rem;
            }

            .time {
                font-size: 2.5rem;
            }

            .modal-content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode-buttons">
            <button id="focusButton" class="mode-button active">Focus 25 m</button>
            <button id="breakButton" class="mode-button">Break 5 m</button>
        </div>

        <div class="timer-display">
            <div class="timer-circle">
                <svg class="progress-ring" width="100%" height="100%" viewBox="0 0 100 100">
                    <circle class="progress-ring__circle" cx="50" cy="50" r="45"/>
                    <circle class="progress-ring__path" cx="50" cy="50" r="45"/>
                </svg>
                <div class="timer-content">
                    <div class="time" id="timeDisplay">25:00</div>
                    <div class="cycle-count" id="cycleDisplay">Cycle 0/4</div>
                </div>
            </div>
        </div>

        <div class="control-buttons">
            <button id="toggleButton" class="control-button">
                <svg class="play-icon" viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M8 5v14l11-7z"/>
                </svg>
                <svg class="pause-icon" viewBox="0 0 24 24" width="24" height="24" style="display: none;">
                    <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>
            <button id="settingsButton" class="control-button">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5zm7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65A.488.488 0 0 0 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98 0 .33.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65z"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Settings</h2>
                <button class="close-modal">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>

                        <div class="setting-group">
                <label for="focusTime">Focus Time (minutes)</label>
                <input type="number" id="focusTime" min="1" max="60" value="25">
                <div class="error-message" id="focusTimeError"></div>
            </div>

            <div class="setting-group">
                <label for="breakTime">Break Time (minutes)</label>
                <input type="number" id="breakTime" min="1" max="60" value="5">
                <div class="error-message" id="breakTimeError"></div>
            </div>

            <div class="setting-group">
                <label for="longBreak">Long Break Time (minutes)</label>
                <input type="number" id="longBreak" min="1" max="60" value="15">
                <div class="error-message" id="longBreakError"></div>
            </div>

            <div class="setting-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="trackCycles" checked>
                    <label for="trackCycles">Track Cycles</label>
                </div>

                <div id="cycleSettings">
                    <label for="cyclesBeforeLongBreak">Cycles Before Long Break</label>
                    <input type="number" id="cyclesBeforeLongBreak" min="1" max="10" value="4">
                    <div class="error-message" id="cyclesError"></div>
                </div>
            </div>

            <div class="setting-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="enableNotifications">
                    <label for="enableNotifications">Enable Notifications</label>
                </div>
                <div class="notification-status" id="notificationStatus">
                    Please allow notifications in your browser settings
                </div>
            </div>

            <button class="save-button" onclick="saveSettings()">Save Settings</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // DOM Elements
        const timeDisplay = document.getElementById('timeDisplay');
        const cycleDisplay = document.getElementById('cycleDisplay');
        const toggleButton = document.getElementById('toggleButton');
        const focusButton = document.getElementById('focusButton');
        const breakButton = document.getElementById('breakButton');
        const settingsButton = document.getElementById('settingsButton');
        const settingsModal = document.getElementById('settingsModal');
        const closeModalButton = document.querySelector('.close-modal');
        const toast = document.getElementById('toast');

        // Icons
        const playIcon = `<svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>`;
        const pauseIcon = `<svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

        // Settings and State
        let settings = {
            focusTime: 25,
            breakTime: 5,
            longBreak: 15,
            trackCycles: true,
            cyclesBeforeLongBreak: 4,
            enableNotifications: false,
            notificationIcon: 'icon-180.png'
        };

        let isRunning = false;
        let mode = 'focus';
        let timeLeft = settings.focusTime * 60;
        let currentCycle = 0;
        let timerId = null;
        let isLongBreak = false;

        // Timer Functions
       function updateDisplay() {
    timeDisplay.textContent = formatTime(timeLeft);
    
    if (settings.trackCycles) {
        // Now correctly showing the full cycle amount from settings
        cycleDisplay.textContent = `Cycle ${currentCycle}/${settings.cyclesBeforeLongBreak}`;
        cycleDisplay.style.display = 'block';
    } else {
        cycleDisplay.style.display = 'none';
    }

    const totalTime = mode === 'focus' ? 
        settings.focusTime * 60 : 
        (isLongBreak ? settings.longBreak : settings.breakTime) * 60;
    
    const progress = ((totalTime - timeLeft) / totalTime) * 100;
    setProgress(progress);
}

// Modified mode switch buttons to preserve time and not affect cycles
focusButton.addEventListener('click', () => {
    if (mode !== 'focus') {
        mode = 'focus';
        // Don't reset the time, keep existing timeLeft
        updateModeButtons();
        updateDisplay();
    }
});

breakButton.addEventListener('click', () => {
    if (mode !== 'break') {
        mode = 'break';
        // Don't reset the time, keep existing timeLeft
        updateModeButtons();
        updateDisplay();
    }
});

function timerTick() {
    if (timeLeft > 0) {
        timeLeft--;
        updateDisplay();
    } else {
        clearInterval(timerId);
        
        if (mode === 'focus') {
            // Only increment cycle when focus period naturally completes
            if (settings.trackCycles) {
                currentCycle++;
            }
            
            if (settings.trackCycles && currentCycle >= settings.cyclesBeforeLongBreak) {
                mode = 'break';
                isLongBreak = true;
                timeLeft = settings.longBreak * 60;
                sendNotification(
                    'Long Break Time!',
                    `Well done! Time for a longer break of ${formatTimeForNotification(settings.longBreak)}.`
                );
            } else {
                mode = 'break';
                timeLeft = settings.breakTime * 60;
                sendNotification(
                    'Break Time',
                    `Great work! Time to take a break for ${formatTimeForNotification(settings.breakTime)}.`
                );
            }
        } else {
            mode = 'focus';
            if (isLongBreak) {
                currentCycle = 0;
                isLongBreak = false;
            }
            timeLeft = settings.focusTime * 60;
            sendNotification(
                'Focus Time',
                `Break's over! Time to focus for ${formatTimeForNotification(settings.focusTime)}.`
            );
        }
        
        updateModeButtons();
        updateDisplay();
        timerId = setInterval(timerTick, 1000);
    }
}

function updateModeButtons() {
    focusButton.textContent = `Focus ${settings.focusTime} m`;
    breakButton.textContent = `${isLongBreak ? 'Long Break' : 'Break'} ${
        mode === 'break' ? (isLongBreak ? settings.longBreak : settings.breakTime) : settings.breakTime
    } m`;
    
    focusButton.classList.toggle('active', mode === 'focus');
    breakButton.classList.toggle('active', mode === 'break');
}

        function setProgress(percent) {
            const circle = document.querySelector('.progress-ring__path');
            const radius = circle.r.baseVal.value;
            const circumference = radius * 2 * Math.PI;
            
            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        }

        function showError(inputId, message) {
            const errorElement = document.getElementById(`${inputId}Error`);
            errorElement.textContent = message;
            errorElement.classList.add('visible');
            setTimeout(() => {
                errorElement.classList.remove('visible');
            }, 3000);
        }

        function showToast(message, duration = 3000) {
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(() => {
                toast.classList.remove('visible');
            }, duration);
        }

        // Settings Functions
        function saveSettings() {
            const newFocusTime = parseInt(document.getElementById('focusTime').value);
            const newBreakTime = parseInt(document.getElementById('breakTime').value);
            const newLongBreak = parseInt(document.getElementById('longBreak').value);
            const newCyclesBeforeLongBreak = parseInt(document.getElementById('cyclesBeforeLongBreak').value);
            
            if (newFocusTime < 1 || newFocusTime > 60) {
                showError('focusTime', 'Focus time must be between 1 and 60 minutes');
                return;
            }
            
            if (newBreakTime < 1 || newBreakTime > 60) {
                showError('breakTime', 'Break time must be between 1 and 60 minutes');
                return;
            }
            
            if (newLongBreak < 1 || newLongBreak > 60) {
                showError('longBreak', 'Long break time must be between 1 and 60 minutes');
                return;
            }
            
            if (newCyclesBeforeLongBreak < 1 || newCyclesBeforeLongBreak > 10) {
                showError('cyclesBeforeLongBreak', 'Cycles must be between 1 and 10');
                return;
            }
            
            settings.focusTime = newFocusTime;
            settings.breakTime = newBreakTime;
            settings.longBreak = newLongBreak;
            settings.cyclesBeforeLongBreak = newCyclesBeforeLongBreak;
            settings.trackCycles = document.getElementById('trackCycles').checked;
            settings.enableNotifications = document.getElementById('enableNotifications').checked;
            
            resetTimer();
            updateModeButtons();
            closeSettingsModal();
            showToast('Settings saved successfully');
        }

        // Notification Functions
        function requestNotificationPermission() {
            if (!('Notification' in window)) {
                document.getElementById('notificationStatus').textContent = 'Notifications not supported';
                document.getElementById('notificationStatus').classList.add('visible');
                document.getElementById('enableNotifications').disabled = true;
                return;
            }

            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    settings.enableNotifications = true;
                    document.getElementById('enableNotifications').checked = true;
                    document.getElementById('notificationStatus').classList.remove('visible');
                } else {
                    document.getElementById('notificationStatus').classList.add('visible');
                }
            });
        }

        function sendNotification(title, body) {
            if (settings.enableNotifications && Notification.permission === 'granted') {
                new Notification(title, {
                    body: body,
                    icon: settings.notificationIcon
                });
            }
        }

        // Helper Functions
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        function formatTimeForNotification(minutes) {
            return `${minutes} minute${minutes !== 1 ? 's' : ''}`;
        }

        // Modal Functions
        function openSettingsModal() {
            document.getElementById('focusTime').value = settings.focusTime;
            document.getElementById('breakTime').value = settings.breakTime;
            document.getElementById('longBreak').value = settings.longBreak;
            document.getElementById('cyclesBeforeLongBreak').value = settings.cyclesBeforeLongBreak;
            document.getElementById('trackCycles').checked = settings.trackCycles;
            document.getElementById('enableNotifications').checked = settings.enableNotifications;
            
            settingsModal.classList.add('visible');
        }

        function closeSettingsModal() {
            settingsModal.classList.remove('visible');
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize SVG circle
            const circle = document.querySelector('.progress-ring__path');
            const radius = circle.r.baseVal.value;
            const circumference = radius * 2 * Math.PI;
            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            circle.style.strokeDashoffset = circumference;

            // Initialize display
            updateDisplay();
            updateModeButtons();
            
            // Add event listeners
            toggleButton.addEventListener('click', toggleTimer);
            settingsButton.addEventListener('click', openSettingsModal);
            closeModalButton.addEventListener('click', closeSettingsModal);
            
            focusButton.addEventListener('click', () => {
                if (mode !== 'focus') {
                    mode = 'focus';
                    timeLeft = settings.focusTime * 60;
                    updateModeButtons();
                    updateDisplay();
                }
            });
            
            breakButton.addEventListener('click', () => {
                if (mode !== 'break') {
                    mode = 'break';
                    timeLeft = (currentCycle >= settings.cyclesBeforeLongBreak - 1 && settings.trackCycles) ? 
                        settings.longBreak * 60 : settings.breakTime * 60;
                    updateModeButtons();
                    updateDisplay();
                }
            });
            
            document.getElementById('trackCycles').addEventListener('change', (e) => {
                const cycleSettings = document.getElementById('cycleSettings');
                cycleSettings.classList.toggle('disabled', !e.target.checked);
            });
            
            document.getElementById('enableNotifications').addEventListener('change', (e) => {
                if (e.target.checked) {
                    requestNotificationPermission();
                }
            });

            // Close modal when clicking outside
            settingsModal.addEventListener('click', (e) => {
                if (e.target === settingsModal) {
                    closeSettingsModal();
                }
            });
        });
    </script>
</body>
</html>
