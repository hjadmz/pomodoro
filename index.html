<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
            --background-color: #1a1a1a;
            --text-color: #ffffff;
            --button-hover: #45a049;
            --modal-background: #2d2d2d;
            --error-color: #ff4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .mode-buttons {
            margin-bottom: 2rem;
        }

        .mode-button {
            background: none;
            border: 2px solid var(--primary-color);
            color: var(--text-color);
            padding: 0.5rem 1rem;
            margin: 0 0.5rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-button.active {
            background-color: var(--primary-color);
        }

        .timer-display {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 2rem;
        }

        .timer-circle {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .progress-ring__circle {
            stroke: var(--background-color);
            fill: none;
            stroke-width: 4;
            r: 45;
            cx: 150;
            cy: 150;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .progress-ring__path {
            stroke: var(--primary-color);
            fill: none;
            stroke-width: 4;
            r: 45;
            cx: 150;
            cy: 150;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            transition: stroke-dashoffset 0.3s ease;
        }

        .timer-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .time {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .cycle-count {
            font-size: 1rem;
            opacity: 0.8;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .control-button {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }

        .control-button:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background-color: var(--modal-background);
            padding: 2rem;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .setting-group {
            margin-bottom: 1.5rem;
        }

        .setting-group label {
            display: block;
            margin-bottom: 0.5rem;
        }

        .setting-group input[type="number"] {
            width: 100%;
            padding: 0.5rem;
            background-color: var(--background-color);
            border: 1px solid var(--primary-color);
            color: var(--text-color);
            border-radius: 4px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.875rem;
            margin-top: 0.25rem;
            min-height: 1.25rem;
        }

        .save-button {
            background-color: var(--primary-color);
            color: var(--text-color);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s ease;
        }

        .save-button:hover {
            background-color: var(--button-hover);
        }

        .notification-status {
            font-size: 0.875rem;
            margin-top: 0.5rem;
            opacity: 0.8;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--primary-color);
            color: var(--text-color);
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .toast.visible {
            opacity: 1;
        }

        .setting-group.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="mode-buttons">
            <button id="focusButton" class="mode-button active">Focus 25m</button>
            <button id="breakButton" class="mode-button">Break 5m</button>
        </div>

        <div class="timer-display">
            <svg class="timer-circle" viewBox="0 0 300 300">
                <circle class="progress-ring__circle" r="45" cx="150" cy="150"/>
                <circle class="progress-ring__path" r="45" cx="150" cy="150"/>
            </svg>
            <div class="timer-content">
                <div id="timeDisplay" class="time">25:00</div>
                <div id="cycleDisplay" class="cycle-count">Cycle 0/2</div>
            </div>
        </div>

        <div class="control-buttons">
            <button id="toggleButton" class="control-button">
                <svg class="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <svg class="pause-icon" style="display: none;" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>
            <button id="settingsButton" class="control-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Settings</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="setting-group">
                <label for="focusTime">Focus Duration (minutes)</label>
                <input type="number" id="focusTime" min="1" max="60" value="25">
                <div class="error-message"></div>
            </div>
            <div class="setting-group">
                <label for="breakTime">Break Duration (minutes)</label>
                <input type="number" id="breakTime" min="1" max="30" value="5">
                <div class="error-message"></div>
            </div>
            <div class="setting-group">
                <label for="longBreak">Long Break Duration (minutes)</label>
                <input type="number" id="longBreak" min="1" max="45" value="15">
                <div class="error-message"></div>
            </div>
            <div class="setting-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="trackCycles" checked>
                    <label for="trackCycles">Track Cycles</label>
                </div>
            </div>
            <div id="cycleSettings" class="setting-group">
                <label for="cyclesBeforeLongBreak">Cycles before Long Break</label>
                <input type="number" id="cyclesBeforeLongBreak" min="1" max="10" value="2">
                <div class="error-message"></div>
            </div>
            <div class="setting-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="enableNotifications">
                    <label for="enableNotifications">Enable Notifications</label>
                </div>
                <div id="notificationStatus" class="notification-status"></div>
            </div>
            <button class="save-button">Save Settings</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

<script>
// DOM Elements
const timeDisplay = document.getElementById('timeDisplay');
const cycleDisplay = document.getElementById('cycleDisplay');
const toggleButton = document.getElementById('toggleButton');
const settingsButton = document.getElementById('settingsButton');
const focusButton = document.getElementById('focusButton');
const breakButton = document.getElementById('breakButton');
const modal = document.getElementById('settingsModal');
const closeModal = document.querySelector('.close-modal');
const saveButton = document.querySelector('.save-button');
const toast = document.getElementById('toast');
const progressRing = document.querySelector('.progress-ring__path');
const playIcon = document.querySelector('.play-icon');
const pauseIcon = document.querySelector('.pause-icon');

// Calculate circle circumference
const radius = 45;
const circumference = radius * 2 * Math.PI;
progressRing.style.strokeDasharray = `${circumference} ${circumference}`;
progressRing.style.strokeDashoffset = circumference;

// Settings and State Management
let settings = {
    focusTime: 25,
    breakTime: 5,
    longBreak: 15,
    trackCycles: true,
    cyclesBeforeLongBreak: 2,
    enableNotifications: false
};

let timeLeft = settings.focusTime * 60;
let timerId = null;
let mode = 'focus';
let focusSessionsCompleted = 0;  // Starts at 0 to show Cycle 0/2
let isRunning = false;

// Functions
function formatTime(seconds) {
    const minutes = Math.floor(seconds / 60);
    const remainingSeconds = seconds % 60;
    return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
}

function setProgress(percent) {
    const offset = circumference - (percent / 100 * circumference);
    progressRing.style.strokeDashoffset = offset;
}

function updateDisplay() {
    timeDisplay.textContent = formatTime(timeLeft);
    
    if (settings.trackCycles) {
        cycleDisplay.textContent = `Cycle ${focusSessionsCompleted}/${settings.cyclesBeforeLongBreak}`;
        cycleDisplay.style.display = 'block';
    } else {
        cycleDisplay.style.display = 'none';
    }

    const totalTime = mode === 'focus' ? 
        settings.focusTime * 60 : 
        (focusSessionsCompleted >= settings.cyclesBeforeLongBreak ? 
            settings.longBreak : settings.breakTime) * 60;
    
    const progress = ((totalTime - timeLeft) / totalTime) * 100;
    setProgress(progress);
}

function showToast(message, duration = 3000) {
    toast.textContent = message;
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), duration);
}

function requestNotificationPermission() {
    if (!('Notification' in window)) {
        document.getElementById('notificationStatus').textContent = 'Notifications not supported';
        return;
    }

    Notification.requestPermission().then(permission => {
        if (permission === 'granted') {
            settings.enableNotifications = true;
            document.getElementById('enableNotifications').checked = true;
            document.getElementById('notificationStatus').textContent = 'Notifications enabled';
        } else {
            settings.enableNotifications = false;
            document.getElementById('enableNotifications').checked = false;
            document.getElementById('notificationStatus').textContent = 'Notifications disabled';
        }
    });
}

function showNotification(title, body) {
    if (settings.enableNotifications && Notification.permission === 'granted') {
        new Notification(title, { body });
    }
}

function switchMode(newMode) {
    mode = newMode;
    if (mode === 'focus') {
        timeLeft = settings.focusTime * 60;
        focusButton.classList.add('active');
        breakButton.classList.remove('active');
        progressRing.style.stroke = '#4CAF50';
    } else {
        const isLongBreak = settings.trackCycles && 
            focusSessionsCompleted >= settings.cyclesBeforeLongBreak;
        timeLeft = (isLongBreak ? settings.longBreak : settings.breakTime) * 60;
        focusButton.classList.remove('active');
        breakButton.classList.add('active');
        progressRing.style.stroke = '#2196F3';
    }
    updateDisplay();
}

function timerTick() {
    if (timeLeft > 0) {
        timeLeft--;
        updateDisplay();
    } else {
        if (mode === 'focus') {
            // Increment focus sessions completed after a focus session
            focusSessionsCompleted++;
            
            // Determine if it's time for a long break
            const isLongBreak = settings.trackCycles && 
                focusSessionsCompleted >= settings.cyclesBeforeLongBreak;
            
            // Switch to break mode
            mode = 'break';
            timeLeft = isLongBreak ? 
                settings.longBreak * 60 : 
                settings.breakTime * 60;
            
            showNotification('Focus Session Complete', 
                `Time for a ${isLongBreak ? 'long ' : ''}break!`);
            
            // Reset cycles counter after completing all cycles
            if (isLongBreak) {
                focusSessionsCompleted = 0;
            }
        } else {
            // Switch back to focus mode
            mode = 'focus';
            timeLeft = settings.focusTime * 60;
            showNotification('Break Complete', 'Time to focus!');
        }
        
        switchMode(mode);
    }
}

function toggleTimer() {
    if (isRunning) {
        clearInterval(timerId);
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
    } else {
        timerId = setInterval(timerTick, 1000);
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
    }
    isRunning = !isRunning;
}

// Event Listeners
toggleButton.addEventListener('click', toggleTimer);
settingsButton.addEventListener('click', () => modal.classList.add('visible'));
closeModal.addEventListener('click', () => modal.classList.remove('visible'));

focusButton.addEventListener('click', () => {
    if (mode !== 'focus') {
        switchMode('focus');
    }
});

breakButton.addEventListener('click', () => {
    if (mode !== 'break') {
        switchMode('break');
    }
});

document.getElementById('trackCycles').addEventListener('change', function() {
    const cycleSettings = document.getElementById('cycleSettings');
    cycleSettings.classList.toggle('disabled', !this.checked);
});

saveButton.addEventListener('click', () => {
    const newSettings = {
        focusTime: parseInt(document.getElementById('focusTime').value),
        breakTime: parseInt(document.getElementById('breakTime').value),
        longBreak: parseInt(document.getElementById('longBreak').value),
        trackCycles: document.getElementById('trackCycles').checked,
        cyclesBeforeLongBreak: parseInt(document.getElementById('cyclesBeforeLongBreak').value),
        enableNotifications: document.getElementById('enableNotifications').checked
    };

    // Validate settings
    if (newSettings.focusTime < 1 || newSettings.focusTime > 60) {
        document.querySelector('#focusTime + .error-message').textContent = 
            'Focus time must be between 1 and 60 minutes';
        return;
    }

    if (newSettings.breakTime < 1 || newSettings.breakTime > 30) {
        document.querySelector('#breakTime + .error-message').textContent = 
            'Break time must be between 1 and 30 minutes';
        return;
    }

    if (newSettings.longBreak < 1 || newSettings.longBreak > 45) {
        document.querySelector('#longBreak + .error-message').textContent = 
            'Long break must be between 1 and 45 minutes';
        return;
    }

    if (newSettings.cyclesBeforeLongBreak < 1 || newSettings.cyclesBeforeLongBreak > 10) {
        document.querySelector('#cyclesBeforeLongBreak + .error-message').textContent = 
            'Cycles must be between 1 and 10';
        return;
    }

    // Clear any error messages
    document.querySelectorAll('.error-message').forEach(el => el.textContent = '');

    // Update settings
    settings = newSettings;

    // If timer is not running, update current time left
    if (!isRunning) {
        timeLeft = settings.focusTime * 60;
        updateDisplay();
    }

    // Handle notification permission
    if (settings.enableNotifications) {
        requestNotificationPermission();
    }

    modal.classList.remove('visible');
    showToast('Settings saved successfully');
});

// Initialize
updateDisplay();
</script>
</body>
</html>
