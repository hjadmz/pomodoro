<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)">
    <title>Pomodoro Timer</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --checkbox-color: #007AFF;
            --bg-color: #ffffff;
            --text-color: #1f2937;
            --secondary-bg: #f3f4f6;
            --border-color: #e5e7eb;
            --modal-overlay: rgba(0, 0, 0, 0.5);
            --ring-bg: #e5e7eb;
            --focus-ring: rgba(59, 130, 246, 0.25);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --text-color: #ffffff;
                --secondary-bg: #1f2937;
                --border-color: #374151;
                --modal-overlay: rgba(0, 0, 0, 0.7);
                --ring-bg: #374151;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 480px;
            width: 100%;
            padding: 2rem;
            background-color: var(--secondary-bg);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .mode-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .mode-button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.2s;
            font-size: 1rem;
            min-height: 44px;
        }

        .mode-button:hover {
            opacity: 0.9;
        }

        .mode-button.active {
            opacity: 1;
            font-weight: 600;
            background-color: var(--primary-color);
            color: white;
        }

        .timer-display {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .timer-circle {
            position: relative;
            width: 16rem;
            height: 16rem;
            margin: 0 auto;
        }

        .timer-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }

        .time {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            line-height: 1;
        }

        .cycle-count {
            font-size: 0.875rem;
            opacity: 0.7;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring__circle {
            fill: none;
            stroke: var(--ring-bg);
            stroke-width: 4;
        }

        .progress-ring__path {
            fill: none;
            stroke: var(--primary-color);
            stroke-linecap: round;
            stroke-width: 4;
            transition: stroke-dashoffset 0.35s;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .control-button {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            border: none;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            min-height: 44px;
        }

        .control-button:hover {
            background-color: var(--border-color);
        }

        .modal {
            position: fixed;
            inset: 0;
            background-color: var(--modal-overlay);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            z-index: 50;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-color);
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 28rem;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            padding: 0.5rem;
        }

        .setting-group {
            margin-bottom: 1.5rem;
        }

        .setting-group:last-child {
            margin-bottom: 0;
        }

        .setting-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .setting-group input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
            min-height: 44px;
        }

        .setting-group input[type="number"]:hover {
            border-color: var(--primary-color);
        }

        .setting-group input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .setting-group input[type="number"]::-webkit-inner-spin-button,
        .setting-group input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .setting-group input[type="number"] {
            -moz-appearance: textfield;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            cursor: pointer;
            min-height: 44px;
            padding: 0.5rem 0;
            gap: 8px;
            margin: 8px 0;
        }

        .setting-group input[type="checkbox"] {
            margin: 0;
            width: 20px;
            height: 20px;
            accent-color: var(--checkbox-color);
            cursor: pointer;
            position: relative;
            top: -1px;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-size: 16px;
            line-height: 1.5;
        }

        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .save-button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1.5rem;
            min-height: 44px;
        }

        .save-button:hover {
            background-color: #2563eb;
        }

        .save-button:focus {
            outline: none;
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .notification-setting {
            display: none;
        }

        .notification-setting.visible {
            display: flex;
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }

            .timer-circle {
                width: 12rem;
                height: 12rem;
            }

            .time {
                font-size: 2.5rem;
            }

            .modal-content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode-buttons">
            <button id="focusButton" class="mode-button active">Focus 25 m</button>
            <button id="breakButton" class="mode-button">Break 5 m</button>
        </div>

        <div class="timer-display">
            <div class="timer-circle">
                <svg class="progress-ring" width="100%" height="100%" viewBox="0 0 100 100">
                    <circle class="progress-ring__circle" cx="50" cy="50" r="45"/>
                    <circle class="progress-ring__path" cx="50" cy="50" r="45"/>
                </svg>
                <div class="timer-content">
                    <div class="time" id="timeDisplay">25:00</div>
                    <div class="cycle-count" id="cycleDisplay">Cycle 1/4</div>
                </div>
            </div>
        </div>

        <div class="control-buttons">
            <button id="toggleButton" class="control-button">
                <svg class="play-icon" viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M8 5v14l11-7z"/>
                </svg>
                <svg class="pause-icon" viewBox="0 0 24 24" width="24" height="24" style="display: none;">
                    <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>
            <button id="settingsButton" class="control-button">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5zm7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65A.488.488 0 0 0 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98 0 .33.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65z"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Settings</h2>
                <button class="close-modal">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>

            <div class="setting-group">
                <label for="focusTime">Focus Time (minutes)</label>
                <input type="number" id="focusTime" min="1" max="60" value="25">
                <div class="error-message" id="focusTime-error"></div>
            </div>

            <div class="setting-group">
                <label for="breakTime">Break Time (minutes)</label>
                <input type="number" id="breakTime" min="1" max="60" value="5">
                <div class="error-message" id="breakTime-error"></div>
            </div>

            <div class="setting-group checkbox-group notification-setting">
                <input type="checkbox" id="enableNotifications">
                <label for="enableNotifications">Enable Notifications</label>
            </div>

            <div class="setting-group checkbox-group">
                <input type="checkbox" id="trackCycles">
                <label for="trackCycles">Track Cycles</label>
            </div>

            <div id="cycleSettings" class="disabled">
                <div class="setting-group">
                    <label for="cyclesBeforeLongBreak">Cycles Before Long Break</label>
                    <input type="number" id="cyclesBeforeLongBreak" min="1" max="10" value="4">
                    <div class="error-message" id="cyclesBeforeLongBreak-error"></div>
                </div>

                <div class="setting-group">
                    <label for="longBreak">Long Break Time (minutes)</label>
                    <input type="number" id="longBreak" min="1" max="60" value="15">
                    <div class="error-message" id="longBreak-error"></div>
                </div>
            </div>

            <button class="save-button">Save Settings</button>
        </div>
    </div>

    <script>
        let settings = {
            focusTime: 25,
            breakTime: 5,
            longBreak: 15,
            trackCycles: true,
            cyclesBeforeLongBreak: 4,
            enableNotifications: true,
            notificationIcon: 'icon-180.png'
        };

        let isRunning = false;
        let mode = 'focus';
        let timeLeft = settings.focusTime * 60;
        let currentCycle = 0;
        let timerId = null;

        // DOM Elements
        const timeDisplay = document.getElementById('timeDisplay');
        const cycleDisplay = document.getElementById('cycleDisplay');
        const toggleButton = document.getElementById('toggleButton');
        const focusButton = document.getElementById('focusButton');
        const breakButton = document.getElementById('breakButton');
        const settingsButton = document.getElementById('settingsButton');
        const settingsModal = document.getElementById('settingsModal');
        const closeModalButton = document.querySelector('.close-modal');
        const saveButton = document.querySelector('.save-button');
        const cycleSettings = document.getElementById('cycleSettings');
        const trackCyclesCheckbox = document.getElementById('trackCycles');
        const progressRing = document.querySelector('.progress-ring__path');
        const notificationCheckbox = document.getElementById('enableNotifications');
        const notificationSetting = document.querySelector('.notification-setting');

        // Progress ring setup
        const radius = 45;
        const circumference = radius * 2 * Math.PI;
        progressRing.style.strokeDasharray = `${circumference} ${circumference}`;
        progressRing.style.strokeDashoffset = circumference;

        // Mobile detection
        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        // Format time for buttons (1 m, 5 m, 1 h)
        function formatTimeForButtons(minutes) {
            if (minutes >= 60) {
                return "1 h";
            }
            return `${minutes} m`;
        }

        // Format time for notifications (1 minute, 5 minutes, 1 hour)
        function formatTimeForNotification(minutes) {
            if (minutes >= 60) {
                return "1 hour";
            }
            return `${minutes} ${minutes === 1 ? 'minute' : 'minutes'}`;
        }

        // Enhanced Notification Functions
        // Enhanced Notification Functions
async function checkNotificationSupport() {
    if (!('Notification' in window)) {
        alert('This browser does not support notifications. Please use a modern browser like Chrome, Firefox, or Safari.');
        return false;
    }
    return true;
}

async function testNotification() {
    try {
        const testNotification = new Notification('Test Notification', {
            body: 'This is a test notification.',
            icon: settings.notificationIcon
        });
        setTimeout(() => testNotification.close(), 3000);
        return true;
    } catch (error) {
        return false;
    }
}

async function diagnoseNotificationIssues() {
    const issues = [];

    // Check if running in secure context (HTTPS or localhost)
    if (!window.isSecureContext) {
        issues.push("- Website must be accessed via HTTPS for notifications to work");
    }

    // Check if notifications are blocked in browser settings
    if (Notification.permission === 'denied') {
        issues.push("- Notifications are blocked in your browser settings");
        issues.push("  To fix: Click the lock/info icon in your address bar and enable notifications");
    }

    // Test if we can actually create a notification (might be blocked by extensions/DNS)
    if (Notification.permission === 'granted' && !(await testNotification())) {
        issues.push("- Notifications might be blocked by:");
        issues.push("  • Ad blockers or privacy extensions (like AdGuard, uBlock Origin)");
        issues.push("  • DNS-level blocking (Pi-hole, AdGuard DNS, NextDNS)");
        issues.push("  • Antivirus software");
        issues.push("  • System-level notification settings");
    }

    return issues;
}

async function requestNotificationPermission() {
    if (!await checkNotificationSupport()) return false;

    try {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
            // Test if notifications actually work
            if (await testNotification()) {
                return true;
            } else {
                const issues = await diagnoseNotificationIssues();
                alert('Notification permission granted, but notifications are not working.\n\n' +
                      'Possible issues:\n' + issues.join('\n') + '\n\n' +
                      'Please disable any ad blockers or DNS filters for this site.');
                return false;
            }
        } else {
            notificationCheckbox.checked = false;
            settings.enableNotifications = false;
            
            if (permission === 'denied') {
                const issues = await diagnoseNotificationIssues();
                alert('Notifications are blocked.\n\n' +
                      'To enable notifications:\n' + issues.join('\n'));
            }
            return false;
        }
    } catch (error) {
        console.error('Error requesting notification permission:', error);
        alert('An error occurred while setting up notifications. This might be caused by:\n' +
              '- Browser privacy settings\n' +
              '- Ad blockers or privacy extensions\n' +
              '- DNS-level blocking\n\n' +
              'Please check your settings and try again.');
        notificationCheckbox.checked = false;
        settings.enableNotifications = false;
        return false;
    }
}

        function sendNotification(title, body) {
            if (!settings.enableNotifications || Notification.permission !== 'granted') return;

            try {
                const notification = new Notification(title, {
                    body: body,
                    icon: settings.notificationIcon,
                    badge: settings.notificationIcon,
                    silent: false,
                    requireInteraction: false
                });

                setTimeout(() => notification.close(), 5000);

                notification.onclick = function(event) {
                    event.preventDefault();
                    window.focus();
                    notification.close();
                };
            } catch (error) {
                console.error('Error sending notification:', error);
            }
        }

        function updatePlayPauseIcon() {
            document.querySelector('.play-icon').style.display = isRunning ? 'none' : 'block';
            document.querySelector('.pause-icon').style.display = isRunning ? 'block' : 'none';
        }

        function setProgress(percent) {
            const offset = circumference - (percent / 100 * circumference);
            progressRing.style.strokeDashoffset = offset;
        }

        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            timeDisplay.textContent = formatTime(timeLeft);
            
            if (settings.trackCycles) {
                cycleDisplay.textContent = `Cycle ${currentCycle + 1}/${settings.cyclesBeforeLongBreak}`;
                cycleDisplay.style.display = 'block';
            } else {
                cycleDisplay.style.display = 'none';
            }

            const totalTime = mode === 'focus' ? 
                settings.focusTime * 60 : 
                (currentCycle >= settings.cyclesBeforeLongBreak - 1 ? settings.longBreak : settings.breakTime) * 60;
            
            const progress = ((totalTime - timeLeft) / totalTime) * 100;
            setProgress(progress);
        }

        function updateModeButtons() {
            const breakTime = currentCycle >= settings.cyclesBeforeLongBreak - 1 && settings.trackCycles ? 
                settings.longBreak : settings.breakTime;
            focusButton.textContent = `Focus ${formatTimeForButtons(settings.focusTime)}`;
            breakButton.textContent = `Break ${formatTimeForButtons(breakTime)}`;
        }

        function timerTick() {
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
            } else {
                clearInterval(timerId);
                
                // Switch modes and continue running
                if (mode === 'focus') {
                    mode = 'break';
                    if (settings.trackCycles) {
                        currentCycle = (currentCycle + 1) % settings.cyclesBeforeLongBreak;
                    }
                    const breakDuration = (currentCycle >= settings.cyclesBeforeLongBreak - 1 && settings.trackCycles) ? 
                        settings.longBreak : settings.breakTime;
                    timeLeft = breakDuration * 60;
                    
                    sendNotification(
                        'Break Time',
                        `Great work! Time to take a break for ${formatTimeForNotification(breakDuration)}.`
                    );
                } else {
                    mode = 'focus';
                    timeLeft = settings.focusTime * 60;
                    
                    sendNotification(
                        'Focus Time',
                        `Break's over! Time to focus for ${formatTimeForNotification(settings.focusTime)}.`
                    );
                }
                
                updateModeButtons();
                updateDisplay();
                focusButton.classList.toggle('active');
                breakButton.classList.toggle('active');
                
                // Restart the timer immediately
                timerId = setInterval(timerTick, 1000);
            }
        }

        // Event Listeners
        toggleButton.addEventListener('click', () => {
            isRunning = !isRunning;
            updatePlayPauseIcon();
            
            if (isRunning) {
                timerId = setInterval(timerTick, 1000);
            } else {
                clearInterval(timerId);
            }
        });

        focusButton.addEventListener('click', () => {
            if (mode !== 'focus') {
                mode = 'focus';
                timeLeft = settings.focusTime * 60;
                focusButton.classList.add('active');
                breakButton.classList.remove('active');
                updateDisplay();
            }
        });

        breakButton.addEventListener('click', () => {
            if (mode !== 'break') {
                mode = 'break';
                timeLeft = (currentCycle >= settings.cyclesBeforeLongBreak - 1 && settings.trackCycles) ? 
                    settings.longBreak * 60 : settings.breakTime * 60;
                focusButton.classList.remove('active');
                breakButton.classList.add('active');
                updateDisplay();
            }
        });

        settingsButton.addEventListener('click', () => {
            document.getElementById('focusTime').value = settings.focusTime;
            document.getElementById('breakTime').value = settings.breakTime;
            document.getElementById('longBreak').value = settings.longBreak;
            document.getElementById('trackCycles').checked = settings.trackCycles;
            document.getElementById('enableNotifications').checked = settings.enableNotifications;
            document.getElementById('cyclesBeforeLongBreak').value = settings.cyclesBeforeLongBreak;
            cycleSettings.classList.toggle('disabled', !settings.trackCycles);
            settingsModal.classList.add('visible');
        });

        closeModalButton.addEventListener('click', () => {
            settingsModal.classList.remove('visible');
        });

        trackCyclesCheckbox.addEventListener('change', () => {
            cycleSettings.classList.toggle('disabled', !trackCyclesCheckbox.checked);
        });

        notificationCheckbox?.addEventListener('change', async function() {
            if (this.checked) {
                const permissionGranted = await requestNotificationPermission();
                if (!permissionGranted) {
                    this.checked = false;
                    return;
                }
            }
            settings.enableNotifications = this.checked;
        });

        function validateInput(input) {
            const value = input.value;
            const errorElement = document.getElementById(`${input.id}-error`);
            
            input.classList.remove('error');
            errorElement.classList.remove('visible');
            
            if (!value || !/^\d+$/.test(value)) {
                errorElement.textContent = 'Please enter a valid number';
                errorElement.classList.add('visible');
                return false;
            }
            
            const numValue = parseInt(value);
            const min = parseInt(input.getAttribute('min'));
            const max = parseInt(input.getAttribute('max'));
            
            if (numValue < min || numValue > max) {
                errorElement.textContent = `Value must be between ${min} and ${max}`;
                errorElement.classList.add('visible');
                return false;
            }
            
            return true;
        }

        saveButton.addEventListener('click', () => {
            const inputs = document.querySelectorAll('#settingsModal input[type="number"]');
            let isValid = true;

            inputs.forEach(input => {
                if (!validateInput(input)) {
                    isValid = false;
                }
            });

            if (isValid) {
                settings.focusTime = parseInt(document.getElementById('focusTime').value);
                settings.breakTime = parseInt(document.getElementById('breakTime').value);
                settings.longBreak = parseInt(document.getElementById('longBreak').value);
                settings.trackCycles = document.getElementById('trackCycles').checked;
                settings.enableNotifications = document.getElementById('enableNotifications').checked;
                settings.cyclesBeforeLongBreak = parseInt(document.getElementById('cyclesBeforeLongBreak').value);

                if (mode === 'focus') {
                    timeLeft = settings.focusTime * 60;
                } else {
                    timeLeft = (currentCycle >= settings.cyclesBeforeLongBreak - 1 && settings.trackCycles) ? 
                        settings.longBreak * 60 : settings.breakTime * 60;
                }

                updateDisplay();
                updateModeButtons();
                settingsModal.classList.remove('visible');
            }
        });

        // Initialize
        setupNotifications();
        updateDisplay();
        updateModeButtons();
        cycleSettings.classList.toggle('disabled', !settings.trackCycles);
        trackCyclesCheckbox.checked = settings.trackCycles;
    </script>
</body>
</html>
