<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)">
    <title>Pomodoro Timer</title>
    <style>
    :root {
        --primary-color: #3b82f6;
        --checkbox-color: #007AFF;
        --bg-color: #ffffff;
        --text-color: #1f2937;
        --secondary-bg: #f3f4f6;
        --border-color: #e5e7eb;
        --modal-overlay: rgba(0, 0, 0, 0.5);
        --ring-bg: #e5e7eb;
        --focus-ring: rgba(59, 130, 246, 0.25);
        --error-color: #ef4444;
        --warning-color: #f59e0b;
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --bg-color: #111827;
            --text-color: #ffffff;
            --secondary-bg: #1f2937;
            --border-color: #374151;
            --modal-overlay: rgba(0, 0, 0, 0.7);
            --ring-bg: #374151;
        }
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
    }

    .container {
        max-width: 480px;
        width: 100%;
        padding: 2rem;
        background-color: var(--secondary-bg);
        border-radius: 1rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .mode-buttons {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 2rem;
    }

    .mode-button {
        flex: 1;
        padding: 0.75rem;
        border: none;
        border-radius: 0.5rem;
        background-color: var(--bg-color);
        color: var(--text-color);
        cursor: pointer;
        opacity: 0.7;
        transition: all 0.2s;
        font-size: 1rem;
        min-height: 44px;
    }

    .mode-button:hover {
        opacity: 0.9;
    }

    .mode-button.active {
        opacity: 1;
        font-weight: 600;
        background-color: var(--primary-color);
        color: white;
    }

    .timer-display {
        text-align: center;
        margin-bottom: 2rem;
        position: relative;
    }

    .timer-circle {
        position: relative;
        width: 16rem;
        height: 16rem;
        margin: 0 auto;
    }

    .timer-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        width: 100%;
    }

    .time {
        font-size: 3.5rem;
        font-weight: bold;
        margin-bottom: 0.5rem;
        line-height: 1;
    }

    .cycle-count {
        font-size: 0.875rem;
        opacity: 0.7;
    }

    .progress-ring {
        transform: rotate(-90deg);
    }

    .progress-ring__circle {
        fill: none;
        stroke: var(--ring-bg);
        stroke-width: 4;
    }

    .progress-ring__path {
        fill: none;
        stroke: var(--primary-color);
        stroke-linecap: round;
        stroke-width: 4;
        transition: stroke-dashoffset 0.35s;
    }

    .control-buttons {
        display: flex;
        justify-content: center;
        gap: 2rem;
    }

    .control-button {
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 50%;
        border: none;
        background-color: var(--bg-color);
        color: var(--text-color);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        min-height: 44px;
    }

    .control-button:hover {
        background-color: var(--border-color);
    }

    .modal {
        position: fixed;
        inset: 0;
        background-color: var(--modal-overlay);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        z-index: 50;
    }

    .modal.visible {
        display: flex;
    }

    .modal-content {
        background-color: var(--bg-color);
        padding: 2rem;
        border-radius: 1rem;
        width: 100%;
        max-width: 28rem;
        position: relative;
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
    }

    .modal-title {
        font-size: 1.5rem;
        font-weight: 600;
    }

    .close-modal {
        background: none;
        border: none;
        color: var(--text-color);
        cursor: pointer;
        padding: 0.5rem;
    }

    .setting-group {
        margin-bottom: 1.5rem;
    }

    .setting-group:last-child {
        margin-bottom: 0;
    }

    .setting-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
    }

    .setting-group input[type="number"] {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border-color);
        border-radius: 0.5rem;
        background-color: var(--bg-color);
        color: var(--text-color);
        font-size: 1rem;
        outline: none;
        transition: all 0.2s ease;
        min-height: 44px;
    }

    .setting-group input[type="number"]:hover {
        border-color: var(--primary-color);
    }

    .setting-group input[type="number"]:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px var(--focus-ring);
    }

    .setting-group input[type="number"]::-webkit-inner-spin-button,
    .setting-group input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }

    .setting-group input[type="number"] {
        -moz-appearance: textfield;
    }

    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 8px 0;
        padding: 0.5rem 0;
    }

    .checkbox-group label {
        margin: 0;
        cursor: pointer;
        font-size: 16px;
        line-height: 1.5;
    }

    .checkbox-group input[type="checkbox"] {
        margin: 0;
        width: 20px;
        height: 20px;
        accent-color: var(--checkbox-color);
        cursor: pointer;
    }

    .checkbox-group input[type="checkbox"]:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .checkbox-group input[type="checkbox"]:disabled + label {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .notification-status {
        font-size: 0.875rem;
        margin-top: 0.25rem;
        color: var(--warning-color);
        display: none;
    }

    .notification-status.visible {
        display: block;
    }

    .error-message {
        color: var(--error-color);
        font-size: 0.875rem;
        margin-top: 0.25rem;
        display: none;
    }

    .error-message.visible {
        display: block;
    }

    .disabled {
        opacity: 0.5;
        pointer-events: none;
    }

    .save-button {
        width: 100%;
        padding: 0.75rem;
        background-color: var(--primary-color);
        color: white;
        border: none;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        margin-top: 1.5rem;
        min-height: 44px;
    }

    .save-button:hover {
        background-color: #2563eb;
    }

    .save-button:focus {
        outline: none;
        box-shadow: 0 0 0 3px var(--focus-ring);
    }

    .notification-setting {
        display: none;
    }

    .notification-setting.visible {
        display: block;
    }

    .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: var(--bg-color);
        color: var(--text-color);
        padding: 1rem;
        border-radius: 0.5rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        display: none;
        z-index: 1000;
        max-width: 300px;
        animation: slideIn 0.3s ease-out;
    }

    .toast.visible {
        display: block;
    }

    @keyframes slideIn {
        from {
            transform: translateX(100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }

    @media (max-width: 480px) {
        .container {
            padding: 1.5rem;
        }

        .timer-circle {
            width: 12rem;
            height: 12rem;
        }

        .time {
            font-size: 2.5rem;
        }

        .modal-content {
            padding: 1.5rem;
        }
    }
    </style>
</head>
    <body>
    <div class="container">
        <div class="mode-buttons">
            <button id="focusButton" class="mode-button active">Focus 25m</button>
            <button id="breakButton" class="mode-button">Break 5m</button>
        </div>

        <div class="timer-display">
            <div class="timer-circle">
                <svg class="progress-ring" width="100%" height="100%" viewBox="0 0 100 100">
                    <circle class="progress-ring__circle" cx="50" cy="50" r="45"/>
                    <circle class="progress-ring__path" cx="50" cy="50" r="45"/>
                </svg>
                <div class="timer-content">
                    <div id="timeDisplay" class="time">25:00</div>
                    <div id="cycleDisplay" class="cycle-count">Cycle 0/3</div>
                </div>
            </div>
        </div>

        <div class="control-buttons">
            <button id="settingsButton" class="control-button" aria-label="Settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
                </svg>
            </button>
            <button id="toggleButton" class="control-button" aria-label="Start/Stop Timer">
                <svg class="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                <svg class="pause-icon" style="display: none;" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="4" width="4" height="16"/>
                    <rect x="14" y="4" width="4" height="16"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Settings</h2>
                <button class="close-modal" aria-label="Close Settings">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <div class="setting-group">
                <label for="focusTime">Focus Duration (minutes)</label>
                <input type="number" id="focusTime" min="1" max="60" value="25">
                <div id="focusTime-error" class="error-message"></div>
            </div>

            <div class="setting-group">
                <label for="breakTime">Short Break Duration (minutes)</label>
                <input type="number" id="breakTime" min="1" max="30" value="5">
                <div id="breakTime-error" class="error-message"></div>
            </div>

            <div class="setting-group">
                <label for="longBreak">Long Break Duration (minutes)</label>
                <input type="number" id="longBreak" min="5" max="45" value="15">
                <div id="longBreak-error" class="error-message"></div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="trackCycles">
                <label for="trackCycles">Track Focus/Break Cycles</label>
            </div>

            <div id="cycleSettings" class="setting-group">
                <label for="cyclesBeforeLongBreak">Cycles before Long Break</label>
                <input type="number" id="cyclesBeforeLongBreak" min="2" max="8" value="4">
                <div id="cyclesBeforeLongBreak-error" class="error-message"></div>
            </div>

            <div class="notification-setting">
                <div class="checkbox-group">
                    <input type="checkbox" id="enableNotifications">
                    <label for="enableNotifications">Enable Notifications</label>
                </div>
                <div id="notificationStatus" class="notification-status"></div>
            </div>

            <button class="save-button">Save Settings</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
let settings = {
    focusTime: 25,
    breakTime: 5,
    longBreak: 15,
    trackCycles: true,
    cyclesBeforeLongBreak: 4,
    enableNotifications: false,
    notificationIcon: 'icon-180.png'
};

let isRunning = false;
let mode = 'focus';
let timeLeft = settings.focusTime * 60;
let currentCycle = 0;  // Starting from 0
let timerId = null;

// DOM Elements
const focusButton = document.getElementById('focusButton');
const breakButton = document.getElementById('breakButton');
const timeDisplay = document.getElementById('timeDisplay');
const cycleDisplay = document.getElementById('cycleDisplay');
const toggleButton = document.getElementById('toggleButton');
const settingsButton = document.getElementById('settingsButton');
const settingsModal = document.getElementById('settingsModal');
const closeModalButton = document.querySelector('.close-modal');
const saveButton = document.querySelector('.save-button');
const playIcon = document.querySelector('.play-icon');
const pauseIcon = document.querySelector('.pause-icon');
const toast = document.getElementById('toast');

// Progress Ring
const circle = document.querySelector('.progress-ring__path');
const radius = circle.r.baseVal.value;
const circumference = radius * 2 * Math.PI;
circle.style.strokeDasharray = `${circumference} ${circumference}`;
circle.style.strokeDashoffset = circumference;

function setProgress(percent) {
    const offset = circumference - (percent / 100) * circumference;
    circle.style.strokeDashoffset = offset;
}

function formatTime(seconds) {
    const minutes = Math.floor(seconds / 60);
    const remainingSeconds = seconds % 60;
    return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
}

function formatTimeForNotification(minutes) {
    return `${minutes} minute${minutes !== 1 ? 's' : ''}`;
}

function updateDisplay() {
    timeDisplay.textContent = formatTime(timeLeft);
    
    if (settings.trackCycles) {
        cycleDisplay.textContent = `Cycle ${currentCycle}/${settings.cyclesBeforeLongBreak - 1}`;
        cycleDisplay.style.display = 'block';
    } else {
        cycleDisplay.style.display = 'none';
    }

    const totalTime = mode === 'focus' ? 
        settings.focusTime * 60 : 
        (currentCycle >= settings.cyclesBeforeLongBreak - 1 ? settings.longBreak : settings.breakTime) * 60;
    
    const progress = ((totalTime - timeLeft) / totalTime) * 100;
    setProgress(progress);
}

function updateModeButtons() {
    const isLongBreak = mode === 'break' && currentCycle >= settings.cyclesBeforeLongBreak - 1;
    focusButton.textContent = `Focus ${settings.focusTime}m`;
    breakButton.textContent = `${isLongBreak ? 'Long Break' : 'Break'} ${isLongBreak ? settings.longBreak : settings.breakTime}m`;
}

function timerTick() {
    if (timeLeft > 0) {
        timeLeft--;
        updateDisplay();
    } else {
        clearInterval(timerId);
        
        if (mode === 'focus') {
            // After focus session, increment cycle counter
            if (settings.trackCycles) {
                currentCycle++;
            }
            
            mode = 'break';
            // Check if it's time for a long break
            const isLongBreak = currentCycle > 0 && currentCycle % settings.cyclesBeforeLongBreak === 0;
            timeLeft = (isLongBreak ? settings.longBreak : settings.breakTime) * 60;
            
            sendNotification(
                'Break Time',
                `Great work! Time to take a ${isLongBreak ? 'long ' : ''}break for ${formatTimeForNotification(isLongBreak ? settings.longBreak : settings.breakTime)}.`
            );
        } else {
            mode = 'focus';
            timeLeft = settings.focusTime * 60;
            
            sendNotification(
                'Focus Time',
                `Break's over! Time to focus for ${formatTimeForNotification(settings.focusTime)}.`
            );
        }
        
        updateModeButtons();
        updateDisplay();
        focusButton.classList.toggle('active');
        breakButton.classList.toggle('active');
        
        timerId = setInterval(timerTick, 1000);
    }
}

function toggleTimer() {
    if (isRunning) {
        clearInterval(timerId);
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
    } else {
        timerId = setInterval(timerTick, 1000);
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
    }
    isRunning = !isRunning;
}

function switchMode(newMode) {
    if (newMode === mode) return;
    
    mode = newMode;
    clearInterval(timerId);
    isRunning = false;
    playIcon.style.display = 'block';
    pauseIcon.style.display = 'none';
    
    timeLeft = (mode === 'focus' ? settings.focusTime : 
        (currentCycle >= settings.cyclesBeforeLongBreak - 1 ? settings.longBreak : settings.breakTime)) * 60;
    
    updateDisplay();
}

function showToast(message, duration = 3000) {
    toast.textContent = message;
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), duration);
}

async function requestNotificationPermission() {
    try {
        const permission = await Notification.requestPermission();
        settings.enableNotifications = permission === 'granted';
        document.getElementById('enableNotifications').checked = settings.enableNotifications;
        document.getElementById('notificationStatus').textContent = 
            permission === 'denied' ? 'Please enable notifications in your browser settings.' : '';
        document.getElementById('notificationStatus').classList.toggle('visible', permission === 'denied');
    } catch (error) {
        console.error('Error requesting notification permission:', error);
        settings.enableNotifications = false;
    }
}

function sendNotification(title, body) {
    if (settings.enableNotifications && Notification.permission === 'granted') {
        try {
            new Notification(title, {
                body,
                icon: settings.notificationIcon
            });
        } catch (error) {
            console.error('Error sending notification:', error);
        }
    }
}

function validateSettings() {
    const errors = {};
    const fields = {
        focusTime: { min: 1, max: 60 },
        breakTime: { min: 1, max: 30 },
        longBreak: { min: 5, max: 45 },
        cyclesBeforeLongBreak: { min: 2, max: 8 }
    };

    for (const [field, limits] of Object.entries(fields)) {
        const input = document.getElementById(field);
        const value = parseInt(input.value);
        const errorElement = document.getElementById(`${field}-error`);
        
        if (isNaN(value) || value < limits.min || value > limits.max) {
            errors[field] = `Please enter a number between ${limits.min} and ${limits.max}`;
            errorElement.textContent = errors[field];
            errorElement.classList.add('visible');
        } else {
            errorElement.classList.remove('visible');
        }
    }

    return Object.keys(errors).length === 0;
}

// Event Listeners
focusButton.addEventListener('click', () => {
    focusButton.classList.add('active');
    breakButton.classList.remove('active');
    switchMode('focus');
});

breakButton.addEventListener('click', () => {
    breakButton.classList.add('active');
    focusButton.classList.remove('active');
    switchMode('break');
});

toggleButton.addEventListener('click', toggleTimer);

settingsButton.addEventListener('click', () => {
    document.getElementById('focusTime').value = settings.focusTime;
    document.getElementById('breakTime').value = settings.breakTime;
    document.getElementById('longBreak').value = settings.longBreak;
    document.getElementById('trackCycles').checked = settings.trackCycles;
    document.getElementById('cyclesBeforeLongBreak').value = settings.cyclesBeforeLongBreak;
    document.getElementById('enableNotifications').checked = settings.enableNotifications;
    
    const cycleSettings = document.getElementById('cycleSettings');
    cycleSettings.style.display = settings.trackCycles ? 'block' : 'none';
    
    settingsModal.classList.add('visible');
});

closeModalButton.addEventListener('click', () => {
    settingsModal.classList.remove('visible');
});

document.getElementById('trackCycles').addEventListener('change', (e) => {
    const cycleSettings = document.getElementById('cycleSettings');
    cycleSettings.style.display = e.target.checked ? 'block' : 'none';
});

document.getElementById('enableNotifications').addEventListener('change', (e) => {
    if (e.target.checked) {
        requestNotificationPermission();
    }
});

saveButton.addEventListener('click', () => {
    if (!validateSettings()) return;
    
    settings.focusTime = parseInt(document.getElementById('focusTime').value);
    settings.breakTime = parseInt(document.getElementById('breakTime').value);
    settings.longBreak = parseInt(document.getElementById('longBreak').value);
    settings.trackCycles = document.getElementById('trackCycles').checked;
    settings.cyclesBeforeLongBreak = parseInt(document.getElementById('cyclesBeforeLongBreak').value);
    settings.enableNotifications = document.getElementById('enableNotifications').checked;
    
    timeLeft = (mode === 'focus' ? settings.focusTime : settings.breakTime) * 60;
    updateModeButtons();
    updateDisplay();
    settingsModal.classList.remove('visible');
    showToast('Settings saved successfully');
});

settingsModal.addEventListener('click', (e) => {
    if (e.target === settingsModal) {
        settingsModal.classList.remove('visible');
    }
});

// Initialize
updateModeButtons();
updateDisplay();

// Check if notifications are supported
if ('Notification' in window) {
    const notificationSetting = document.querySelector('.notification-setting');
    notificationSetting.classList.add('visible');
    
    if (Notification.permission === 'granted') {
        settings.enableNotifications = true;
        document.getElementById('enableNotifications').checked = true;
    }
} else {
    settings.enableNotifications = false;
}

    </script>
</body>
</html>
