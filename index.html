<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary-color: #3b82f6;
            --checkbox-color: #007AFF;
            --bg-color: #ffffff;
            --text-color: #1f2937;
            --secondary-bg: #f3f4f6;
            --border-color: #e5e7eb;
            --modal-overlay: rgba(0, 0, 0, 0.5);
            --ring-bg: #e5e7eb;
            --focus-ring: rgba(59, 130, 246, 0.25);
            --error-color: #ef4444;
            --warning-color: #f59e0b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --text-color: #ffffff;
                --secondary-bg: #1f2937;
                --border-color: #374151;
                --modal-overlay: rgba(0, 0, 0, 0.7);
                --ring-bg: #374151;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 480px;
            width: 100%;
            padding: 2rem;
            background-color: var(--secondary-bg);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .mode-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .mode-button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.2s;
            font-size: 1rem;
            min-height: 44px;
        }

        .mode-button:hover {
            opacity: 0.9;
        }

        .mode-button.active {
            opacity: 1;
            font-weight: 600;
            background-color: var(--primary-color);
            color: white;
        }

        .timer-display {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .timer-circle {
            position: relative;
            width: 16rem;
            height: 16rem;
            margin: 0 auto;
        }

        .timer-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }

        .time {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            line-height: 1;
        }

        .cycle-count {
            font-size: 0.875rem;
            opacity: 0.7;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring__circle {
            fill: none;
            stroke: var(--ring-bg);
            stroke-width: 4;
        }

        .progress-ring__path {
            fill: none;
            stroke: var(--primary-color);
            stroke-linecap: round;
            stroke-width: 4;
            transition: stroke-dashoffset 0.35s;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .control-button {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            border: none;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            min-height: 44px;
        }

        .control-button:hover {
            background-color: var(--border-color);
        }

        .modal {
            position: fixed;
            inset: 0;
            background-color: var(--modal-overlay);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            z-index: 50;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-color);
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 28rem;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            padding: 0.5rem;
        }

        .setting-group {
            margin-bottom: 1.5rem;
        }

        .setting-group:last-child {
            margin-bottom: 0;
        }

        .setting-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .setting-group input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
            min-height: 44px;
        }

        .setting-group input[type="number"]:hover {
            border-color: var(--primary-color);
        }

        .setting-group input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .setting-group input[type="number"]::-webkit-inner-spin-button,
        .setting-group input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .setting-group input[type="number"] {
            -moz-appearance: textfield;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
            padding: 0.5rem 0;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-size: 16px;
            line-height: 1.5;
        }

        .checkbox-group input[type="checkbox"] {
            margin: 0;
            width: 20px;
            height: 20px;
            accent-color: var(--checkbox-color);
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .checkbox-group input[type="checkbox"]:disabled + label {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .notification-status {
            font-size: 0.875rem;
            margin-top: 0.25rem;
            color: var(--warning-color);
            display: none;
        }

        .notification-status.visible {
            display: block;
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .save-button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1.5rem;
            min-height: 44px;
        }

        .save-button:hover {
            background-color: #2563eb;
        }

        .save-button:focus {
            outline: none;
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .notification-setting {
            display: none;
        }

        .notification-setting.visible {
            display: block;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 1rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 1000;
            max-width: 300px;
            animation: slideIn 0.3s ease-out;
        }

        .toast.visible {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }

            .timer-circle {
                width: 12rem;
                height: 12rem;
            }

            .time {
                font-size: 2.5rem;
            }

            .modal-content {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="mode-buttons">
            <button id="focusButton" class="mode-button active">Focus 25 m</button>
            <button id="breakButton" class="mode-button">Break 5 m</button>
        </div>

        <div class="timer-display">
            <div class="timer-circle">
                <svg class="progress-ring" width="100%" height="100%" viewBox="0 0 100 100">
                    <circle class="progress-ring__circle" cx="50" cy="50" r="45"/>
                    <circle class="progress-ring__path" cx="50" cy="50" r="45"/>
                </svg>
                <div class="timer-content">
                    <div class="time" id="timeDisplay">25:00</div>
                    <div class="cycle-count" id="cycleDisplay">Cycle 1/4</div>
                </div>
            </div>
        </div>

        <div class="control-buttons">
            <button id="toggleButton" class="control-button">
                <svg class="play-icon" viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M8 5v14l11-7z"/>
                </svg>
                <svg class="pause-icon" viewBox="0 0 24 24" width="24" height="24" style="display: none;">
                    <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>
            <button id="settingsButton" class="control-button">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5zm7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65A.488.488 0 0 0 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98 0 .33.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65z"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Settings</h2>
                <button class="close-modal">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>

            <div class="setting-group">
                <label for="focusTime">Focus Time (minutes)</label>
                <input type="number" id="focusTime" min="1" max="60" value="25">
                <div class="error-message" id="focusTime-error"></div>
            </div>

            <div class="setting-group">
                <label for="breakTime">Break Time (minutes)</label>
                <input type="number" id="breakTime" min="1" max="60" value="5">
                <div class="error-message" id="breakTime-error"></div>
            </div>

            <div class="setting-group notification-setting">
                <div class="checkbox-group">
                    <input type="checkbox" id="enableNotifications">
                    <label for="enableNotifications">Enable Notifications</label>
                </div>
                <div class="notification-status" id="notificationStatus"></div>
            </div>

            <div class="setting-group checkbox-group">
                <input type="checkbox" id="trackCycles">
                <label for="trackCycles">Track Cycles</label>
            </div>

            <div id="cycleSettings" class="disabled">
                <div class="setting-group">
                    <label for="cyclesBeforeLongBreak">Cycles Before Long Break</label>
                    <input type="number" id="cyclesBeforeLongBreak" min="1" max="10" value="4">
                    <div class="error-message" id="cyclesBeforeLongBreak-error"></div>
                </div>

                <div class="setting-group">
                    <label for="longBreak">Long Break Time (minutes)</label>
                    <input type="number" id="longBreak" min="1" max="60" value="15">
                    <div class="error-message" id="longBreak-error"></div>
                </div>
            </div>

            <button class="save-button">Save Settings</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>
 <script>
    // Settings with local storage persistence
    let settings = JSON.parse(localStorage.getItem('pomodoroSettings')) || {
        focusTime: 25,
        breakTime: 5,
        longBreak: 15,
        trackCycles: true,
        cyclesBeforeLongBreak: 4,
        enableNotifications: false,
        notificationIcon: 'icon-180.png'
    };
    
    let isRunning = false;
    let mode = 'focus';
    let timeLeft = settings.focusTime * 60;
    let currentCycle = 0;  // Starts at 0
    let timerInterval = null;
    let isFirstStart = true;
    let startTime = null;
    let expectedTime = null;
    
    // DOM Elements
    const timeDisplay = document.getElementById('timeDisplay');
    const cycleDisplay = document.getElementById('cycleDisplay');
    const toggleButton = document.getElementById('toggleButton');
    const focusButton = document.getElementById('focusButton');
    const breakButton = document.getElementById('breakButton');
    const settingsButton = document.getElementById('settingsButton');
    const settingsModal = document.getElementById('settingsModal');
    const closeModalButton = document.querySelector('.close-modal');
    const saveButton = document.querySelector('.save-button');
    const cycleSettings = document.getElementById('cycleSettings');
    const trackCyclesCheckbox = document.getElementById('trackCycles');
    const progressRing = document.querySelector('.progress-ring__path');
    const notificationCheckbox = document.getElementById('enableNotifications');
    const notificationSetting = document.querySelector('.notification-setting');
    const notificationStatus = document.getElementById('notificationStatus');
    const toast = document.getElementById('toast');
    
    // Progress ring setup
    const radius = 45;
    const circumference = radius * 2 * Math.PI;
    progressRing.style.strokeDasharray = `${circumference} ${circumference}`;
    progressRing.style.strokeDashoffset = circumference;
    
    function saveSettings() {
        localStorage.setItem('pomodoroSettings', JSON.stringify(settings));
    }
    
    function isMobileDevice() {
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }
    
    function showToast(message, duration = 3000) {
        toast.textContent = message;
        toast.classList.add('visible');
        setTimeout(() => {
            toast.classList.remove('visible');
        }, duration);
    }
    
    async function checkNotificationSupport() {
        if (!('Notification' in window)) {
            notificationStatus.textContent = 'This browser does not support desktop notifications';
            notificationStatus.classList.add('visible');
            notificationCheckbox.disabled = true;
            return false;
        }

        if (Notification.permission === 'denied') {
            notificationStatus.textContent = 'Notifications are blocked. Please enable them in your browser settings.';
            notificationStatus.classList.add('visible');
            notificationCheckbox.disabled = true;
            checkNotificationBlockers(); // Check for blockers
            return false;
        }

        return true;
    }

    function checkNotificationBlockers() {
        const blockers = [];

        // Check for common blockers
        if (navigator.userAgent.includes('AdBlock')) {
            blockers.push('Your ad blocker may be preventing notifications from working.');
        }
        if (window.location.hostname === 'localhost') {
            blockers.push('Notifications may not work properly in localhost. Try deploying to a live server.');
        }
        if (navigator.userAgent.includes('Chrome') && !navigator.userAgent.includes('Edge')) {
            blockers.push('Ensure that Chrome is not set to block notifications in its settings.');
        }

        // Display the reasons if any blockers are found
        if (blockers.length > 0) {
            notificationStatus.textContent += ' Possible reasons for the issue: ' + blockers.join(' ');
            notificationStatus.classList.add('visible');
        }
    }

    async function requestNotificationPermission() {
        try {
            if (!await checkNotificationSupport()) {
                notificationCheckbox.checked = false;
                settings.enableNotifications = false;
                return false;
            }

            if (Notification.permission === 'granted') {
                notificationStatus.classList.remove('visible');
                return true;
            }

            const permission = await Notification.requestPermission();

            if (permission === 'granted') {
                notificationStatus.classList.remove('visible');
                new Notification("Pomodoro Timer", {
                    body: "Notifications are now enabled! You'll be notified when your sessions end.",
                    icon: settings.notificationIcon
                });
                return true;
            } else {
                notificationCheckbox.checked = false;
                settings.enableNotifications = false;
                if (permission === 'denied') {
                    checkNotificationBlockers(); // Check for blockers
                    notificationStatus.textContent = 'Notifications are blocked. Please enable them in your browser settings.';
                    notificationStatus.classList.add('visible');
                }
                return false;
            }
        } catch (error) {
            console.error('Error requesting notification permission:', error);
            notificationStatus.textContent = 'There was an error setting up notifications. Please try again.';
            notificationStatus.classList.add('visible');
            notificationCheckbox.checked = false;
            settings.enableNotifications = false;
            return false;
        }
    }

    function formatTime(seconds) {
        const minutes = Math.floor(seconds / 60);
        const remainingSeconds = seconds % 60;
        return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
    }

    function updateDisplay() {
        timeDisplay.textContent = formatTime(timeLeft);
        
        if (settings.trackCycles) {
            cycleDisplay.textContent = `Cycle ${currentCycle}/${settings.cyclesBeforeLongBreak}`;
            cycleDisplay.style.display = 'block';
        } else {
            cycleDisplay.style.display = 'none';
        }

        const totalTime = mode === 'focus' ? 
            settings.focusTime * 60 : 
            (currentCycle === settings.cyclesBeforeLongBreak ? settings.longBreak : settings.breakTime) * 60;
        
        const progress = ((totalTime - timeLeft) / totalTime) * 100;
        setProgress(progress);
        
        updatePageTitle();
    }

    function updatePageTitle() {
        const modeText = mode === 'focus' ? 'Focus' : 'Break';
        document.title = `${modeText} (${formatTime(timeLeft)})`;
    }

    function setProgress(percent) {
        const offset = circumference - (percent / 100 * circumference);
        progressRing.style.strokeDashoffset = offset;
    }

    function timerTick() {
        const now = Date.now();
        const elapsed = Math.floor((now - startTime) / 1000);
        
        timeLeft = expectedTime - elapsed;
        
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            isRunning = false;
            currentCycle++;
            showToast(`${mode.charAt(0).toUpperCase() + mode.slice(1)} session completed!`);
            if (settings.enableNotifications) {
                new Notification("Pomodoro Timer", {
                    body: `${mode.charAt(0).toUpperCase() + mode.slice(1)} session completed!`,
                    icon: settings.notificationIcon
                });
            }
            mode = mode === 'focus' ? 'break' : 'focus';
            timeLeft = mode === 'focus' ? settings.focusTime * 60 : (currentCycle === settings.cyclesBeforeLongBreak ? settings.longBreak : settings.breakTime) * 60;
            updateDisplay();
            toggleButton.textContent = 'Start';
            return;
        }
        
        updateDisplay();
    }

    // Event Listeners for Timer Controls
    toggleButton.addEventListener('click', () => {
        isRunning = !isRunning;
        updatePlayPauseIcon();
        updateModeButtonsState();
        
        if (isRunning) {
            startTime = Date.now();
            expectedTime = timeLeft;
            timerInterval = setInterval(timerTick, 100); // Run more frequently for smoother updates
        } else {
            clearInterval(timerInterval);
        }
    });

    focusButton.addEventListener('click', () => {
        mode = 'focus';
        timeLeft = settings.focusTime * 60;
        updateDisplay();
    });

    breakButton.addEventListener('click', () => {
        mode = 'break';
        timeLeft = settings.breakTime * 60;
        updateDisplay();
    });

    // Event Listeners for Settings Modal
    settingsButton.addEventListener('click', () => {
        settingsModal.classList.add('visible');
        trackCyclesCheckbox.checked = settings.trackCycles;
        notificationCheckbox.checked = settings.enableNotifications;
    });

    closeModalButton.addEventListener('click', () => {
        settingsModal.classList.remove('visible');
    });

    saveButton.addEventListener('click', () => {
        settings.trackCycles = trackCyclesCheckbox.checked;
        settings.enableNotifications = notificationCheckbox.checked;
        saveSettings();
        settingsModal.classList.remove('visible');
        showToast('Settings saved!');
    });

    // Event Listener for Notification Checkbox
    notificationCheckbox.addEventListener('change', async () => {
        if (notificationCheckbox.checked) {
            await requestNotificationPermission();
        } else {
            settings.enableNotifications = false;
            notificationStatus.classList.remove('visible');
        }
    });

    // Initial Display Update
    updateDisplay();

</script>                                     
</body>
</html>
